<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rich! | Carbonography</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #e3f2fd;
            --white: #ffffff;
            --accent-red: #d32f2f;
        }

        body {
            background-color: var(--sky-blue);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
        }

        /* The "Unlock" Overlay - Vital for Music */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--sky-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            font-family: 'Great Vibes', cursive;
        }

        /* Main Card Layout */
        .page-content {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .header-actions {
            margin-bottom: 30px;
        }

        .btn-print {
            background-color: #555;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .card-container {
            background-color: var(--white);
            width: 100%;
            max-width: 900px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden;
            border: 10px solid var(--white);
        }

        .card-image {
            width: 100%;
            display: block;
        }

        .card-content {
            padding: 60px 20px;
            text-align: center;
        }

        .message {
            font-family: 'Great Vibes', cursive;
            font-size: 5rem;
            color: var(--accent-red);
            margin: 0;
        }

        .from-line {
            font-family: 'Caveat', cursive;
            font-size: 2.5rem;
            color: #444;
            margin-top: 20px;
        }

        .logo-footer {
            margin-top: 40px;
        }

        .logo-footer img {
            height: 60px;
        }

        @media print {
            #overlay, .header-actions { display: none; }
            body { background: white; padding: 0; }
            .card-container { box-shadow: none; border: none; }
        }

        @media (max-width: 600px) {
            .message { font-size: 3.2rem; }
            .from-line { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="startCard()">Click to Open Rich's Card ✉️</button>
    </div>

    <audio id="bday-audio" loop preload="auto">
        <source src="https://files.catbox.moe/87fbbv.wav" type="audio/wav">
    </audio>

    <div class="page-content">
        <div class="header-actions">
            <button class="btn-print" onclick="window.print()">🖨️ Print to PDF</button>
        </div>

        <div class="card-container">
            <img src="https://github.com/aherndavid/carbonography/raw/main/assets/rich-birthday.png" alt="Happy Birthday" class="card-image">
            
            <div class="card-content">
                <h1 class="message">Happy Birthday, Rich</h1>
                <p class="from-line">From David, Logan & Skylar</p>

                <div class="logo-footer">
                    <img src="https://carbonography.co.uk/carbonography-logo.png" alt="Carbonography Logo">
                </div>
            </div>
        </div>
    </div>

    <script>
        function startCard() {
            const audio = document.getElementById('bday-audio');
            const overlay = document.getElementById('overlay');
            
            // 1. Play the audio
            audio.play().catch(function(error) {
                console.log("Playback failed:", error);
            });

            // 2. Hide the overlay
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 500);
        }
    </script>
</body>
</html>

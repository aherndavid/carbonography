<!DOCTYPE html>
<html lang="en">
<head>
    <meta property="og:type" content="website">
<meta property="og:url" content="https://www.carbonography.co.uk/cards/rich-birthday.html">
<meta property="og:title" content="Happy Birthday Rich! 🎂">
<meta property="og:description" content="A special musical surprise from David, Logan & Skylar.">
<meta property="og:image" content="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/rich-birthday.png">

<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="https://www.carbonography.co.uk/cards/rich-birthday.html">
<meta property="twitter:title" content="Happy Birthday Rich! 🎂">
<meta property="twitter:description" content="A special musical surprise from David, Logan & Skylar.">
<meta property="twitter:image" content="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/rich-birthday.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rich! | Carbonography</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #e3f2fd;
            --white: #ffffff;
            --accent-red: #d32f2f;
        }

        body {
            background-color: var(--sky-blue);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; font-family: 'Segoe UI', sans-serif;
        }

        /* Entry Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sky-blue);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .start-btn {
            background-color: var(--accent-red);
            color: white; border: none;
            padding: 20px 50px; font-size: 1.8rem;
            border-radius: 50px; cursor: pointer;
            font-family: 'Great Vibes', cursive;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* Fixed Music Toggle - Moved to Bottom Right of screen */
        #music-toggle {
            position: fixed; 
            bottom: 30px; 
            right: 30px;
            background: var(--white);
            border-radius: 50%; 
            width: 60px; 
            height: 60px;
            display: flex; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            font-size: 1.8rem; 
            z-index: 1000;
            border: 3px solid var(--accent-red);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* Card Layout */
        .card-container {
            background-color: var(--white);
            width: 95%; max-width: 900px;
            margin: 40px 0; border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden; border: 10px solid var(--white);
        }

        .card-image { width: 100%; display: block; }

        .card-content { padding: 60px 20px; text-align: center; }

        .message { font-family: 'Great Vibes', cursive; font-size: 5rem; color: var(--accent-red); margin: 0; }

        .from-line { font-family: 'Caveat', cursive; font-size: 2.5rem; color: #444; margin-top: 20px; }

        .logo-footer img { height: 60px; margin-top: 40px; }

        .btn-print {
            margin-top: 20px; background: #eee; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold; color: #555;
        }

        @media (max-width: 600px) {
            .message { font-size: 3.2rem; }
            .from-line { font-size: 1.8rem; }
            #music-toggle { bottom: 20px; right: 20px; width: 50px; height: 50px; font-size: 1.5rem; }
        }

        @media print { #overlay, #music-toggle, .btn-print { display: none; } }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="initCard()">Open Rich's Card ✉️</button>
        <div style="margin-top:15px; color:#666;">Turn your volume UP! 🔊</div>
    </div>

    <audio id="bday-music" loop preload="auto">
        <source src="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/h17-lets-all-make-a-bomb.mp3" type="audio/mpeg">
    </audio>

    <div id="music-toggle" onclick="toggleMusic()">🔇</div>

    <div class="card-container">
        <img src="https://github.com/aherndavid/carbonography/raw/main/assets/rich-birthday.png" alt="Happy Birthday" class="card-image">
        
        <div class="card-content">
            <h1 class="message">Happy Birthday, Rich</h1>
            <p class="from-line">From David, Logan & Skylar</p>
            
            <div class="logo-footer">
                <img src="https://carbonography.co.uk/carbonography-logo.png" alt="Carbonography Logo">
            </div>

            <button class="btn-print" onclick="window.print()">Print to PDF</button>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bday-music');
        const toggleBtn = document.getElementById('music-toggle');

        function initCard() {
            audio.play().then(() => {
                toggleBtn.innerText = "🔊";
            }).catch(e => console.log("Waiting for user..."));
            document.getElementById('overlay').style.display = 'none';
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                toggleBtn.innerText = "🔊";
            } else {
                audio.pause();
                toggleBtn.innerText = "🔇";
            }
        }
    </script>
</body>
</html>

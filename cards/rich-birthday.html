<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Rich! | Carbonography</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #e3f2fd;
            --white: #ffffff;
            --accent-red: #d32f2f;
        }

        body {
            background-color: var(--sky-blue);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; font-family: 'Segoe UI', sans-serif;
        }

        /* The Entry Overlay */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--sky-blue);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .start-btn {
            background-color: var(--accent-red);
            color: white; border: none;
            padding: 20px 50px; font-size: 1.8rem;
            border-radius: 50px; cursor: pointer;
            font-family: 'Great Vibes', cursive;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .mute-hint {
            margin-top: 15px; font-size: 0.9rem; color: #666;
        }

        /* Card Layout */
        .card-container {
            background-color: var(--white);
            width: 95%; max-width: 900px;
            margin: 40px 0; border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            overflow: hidden; border: 10px solid var(--white);
            position: relative;
        }

        /* Floating Music Toggle */
        #music-toggle {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%; width: 50px; height: 50px;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; font-size: 1.5rem; z-index: 100;
            border: 2px solid var(--accent-red);
        }

        .card-image { width: 100%; display: block; }

        .card-content { padding: 60px 20px; text-align: center; }

        .message { font-family: 'Great Vibes', cursive; font-size: 5rem; color: var(--accent-red); margin: 0; }

        .from-line { font-family: 'Caveat', cursive; font-size: 2.5rem; color: #444; margin-top: 20px; }

        .logo-footer img { height: 60px; margin-top: 40px; }

        @media (max-width: 600px) {
            .message { font-size: 3rem; }
            .from-line { font-size: 1.8rem; }
        }

        @media print { #overlay, #music-toggle { display: none; } }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="start-btn" onclick="initCard()">Open Rich's Card ✉️</button>
        <div class="mute-hint">Ensure your ringer/volume is UP! 🔊</div>
    </div>

    <audio id="bday-music" loop preload="auto">
        <source src="https://files.catbox.moe/87fbbv.wav" type="audio/wav">
    </audio>

    <div class="card-container">
        <div id="music-toggle" onclick="toggleMusic()">🔇</div>

        <img src="https://github.com/aherndavid/carbonography/raw/main/assets/rich-birthday.png" alt="Happy Birthday" class="card-image">
        
        <div class="card-content">
            <h1 class="message">Happy Birthday, Rich</h1>
            <p class="from-line">From David, Logan & Skylar</p>
            <div class="logo-footer">
                <img src="https://carbonography.co.uk/carbonography-logo.png" alt="Carbonography Logo">
            </div>
        </div>
    </div>

    <script>
        const audio = document.getElementById('bday-music');
        const toggleBtn = document.getElementById('music-toggle');

        function initCard() {
            // Attempt playback
            audio.play().then(() => {
                toggleBtn.innerText = "🔊";
            }).catch(e => console.log("Playback blocked or loading:", e));

            // Hide overlay
            document.getElementById('overlay').style.display = 'none';
        }

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                toggleBtn.innerText = "🔊";
            } else {
                audio.pause();
                toggleBtn.innerText = "🔇";
            }
        }
    </script>
</body>
</html>

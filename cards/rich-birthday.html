<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Card for Rich</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --light-blue: #e3f2fd;
            --card-cream: #ffffff;
            --vintage-red: #b71c1c;
            --text-brown: #3e2723;
        }

        body {
            background-color: var(--light-blue);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Print Button Styling */
        .print-actions {
            margin-bottom: 30px;
        }

        .btn-print {
            background-color: var(--vintage-red);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-print:hover {
            background-color: #801313;
            transform: translateY(-2px);
        }

        /* The Card - Made Larger */
        .birthday-card {
            background-color: var(--card-cream);
            width: 100%;
            max-width: 900px; /* Increased size */
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .card-image {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .card-content {
            padding: 50px 20px;
            text-align: center;
        }

        .main-message {
            font-family: 'Great Vibes', cursive;
            font-size: 4.5rem; /* Larger font */
            color: var(--vintage-red);
            margin: 0 0 10px 0;
        }

        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 2.2rem;
            color: var(--text-brown);
            margin-top: 10px;
        }

        /* Hide print button when printing/saving to PDF */
        @media print {
            .print-actions {
                display: none;
            }
            body {
                background-color: white;
                padding: 0;
            }
            .birthday-card {
                box-shadow: none;
                max-width: 100%;
                border: none;
            }
        }

        /* Responsive scaling */
        @media (max-width: 768px) {
            .main-message { font-size: 3rem; }
            .signature { font-size: 1.5rem; }
            body { padding: 20px 10px; }
        }
    </style>
</head>
<body>

    <div class="print-actions">
        <button class="btn-print" onclick="window.print()">🖨️ Print Card to PDF</button>
    </div>

    <div class="birthday-card">
        <img src="https://github.com/aherndavid/carbonography/raw/main/assets/rich-birthday.png" alt="Rich's Birthday" class="card-image">
        
        <div class="card-content">
            <h1 class="main-message">Happy Birthday, Rich</h1>
            <p class="signature">From David, Logan & Skylar</p>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonography | Coming Soon</title>
    <style>
        :root {
            --carbon-red: #cc0000;
            --carbon-white: #ffffff;
            --carbon-black: rgba(10, 10, 10, 0.9); /* Slight transparency for the bottom bar */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #ffffff;
            overflow: hidden; /* Prevents scrolling */
        }

        /* Full Screen Background Image */
        .full-page-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/purple-lambo.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
        }

        /* Bottom Status Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--carbon-black);
            color: var(--carbon-white);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 40px;
            border-top: 3px solid var(--carbon-red);
            backdrop-filter: blur(10px); /* Adds a modern frosted glass effect */
            z-index: 10;
        }

        /* Layout Elements */
        .status-text {
            flex: 1;
            font-size: 1.4rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .status-text span {
            color: var(--carbon-red);
        }

        .logo-center {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .logo-center img {
            height: 70px; /* Adjust based on your logo design */
            width: auto;
        }

        /* Countdown Timer */
        .timer-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }

        .timer-block {
            text-align: center;
            min-width: 50px;
        }

        .timer-val {
            display: block;
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--carbon-red);
            line-height: 1;
        }

        .timer-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #999;
            letter-spacing: 1px;
        }

        /* Responsive Design for smaller screens */
        @media (max-width: 1000px) {
            .bottom-bar {
                flex-direction: column;
                padding: 20px;
                text-align: center;
                gap: 15px;
            }
            .status-text, .logo-center, .timer-right {
                flex: none;
                justify-content: center;
            }
            .full-page-bg {
                background-position: 70% center; /* Shifts image slightly to show car on mobile */
            }
        }
    </style>
</head>
<body>

    <div class="full-page-bg"></div>

    <footer class="bottom-bar">
        
        <div class="status-text">
            Carbonography <span>Coming Soon</span>
        </div>

        <div class="logo-center">
            <img src="carbonography-logo.png" alt="Carbonography Logo">
        </div>

        <div class="timer-right" id="countdown">
            <div class="timer-block">
                <span class="timer-val" id="days">00</span>
                <span class="timer-label">Days</span>
            </div>
            <div class="timer-block">
                <span class="timer-val" id="hours">00</span>
                <span class="timer-label">Hrs</span>
            </div>
            <div class="timer-block">
                <span class="timer-val" id="minutes">00</span>
                <span class="timer-label">Mins</span>
            </div>
            <div class="timer-block">
                <span class="timer-val" id="seconds">00</span>
                <span class="timer-label">Secs</span>
            </div>
        </div>

    </footer>

    <script>
        // Set target date: May 1, 2026
        const targetDate = new Date("May 1, 2026 00:00:00").getTime();

        const updateTimer = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');

            if (difference < 0) {
                clearInterval(updateTimer);
                document.getElementById("countdown").innerHTML = "<span style='color:white; letter-spacing:2px;'>START YOUR ENGINES</span>";
            }
        }, 1000);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonography | Launching Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* Full Screen Background Slider */
        .slider-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out; /* Smooth transition */
        }

        .slide.active {
            opacity: 1;
        }

        /* Dark overlay for text readability */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        /* Footer Section */
        .footer-branding {
            position: fixed;
            bottom: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .logo {
            height: 50px;
            width: auto;
        }

        .site-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .site-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Vertical Divider */
        .divider {
            width: 1px;
            height: 30px;
            background-color: rgba(255,255,255,0.4);
        }

        /* Countdown Style */
        .countdown {
            display: flex;
            gap: 15px;
            font-family: monospace;
        }

        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-value {
            font-size: 24px;
            font-weight: bold;
        }

        .time-label {
            font-size: 9px;
            text-transform: uppercase;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .footer-branding {
                flex-direction: column;
                align-items: flex-start;
                bottom: 20px;
                left: 20px;
            }
            .divider { display: none; }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slide active" style="background-image: url('assets/purple-lambo.png');"></div>
        <div class="slide" style="background-image: url('assets/dpaul-gumball-lambo.png');"></div>
    </div>

    <div class="overlay"></div>

    <div class="footer-branding">
        <img src="assets/carbonography-logo.png" alt="Logo" class="logo">
        
        <div class="site-info">
            <span class="site-name">Carbonography.</span>
            <div class="divider"></div>
            
            <div class="countdown" id="timer">
                <div class="time-block">
                    <span class="time-value" id="days">00</span>
                    <span class="time-label">Days</span>
                </div>
                <div class="time-block">
                    <span class="time-value" id="hours">00</span>
                    <span class="time-label">Hrs</span>
                </div>
                <div class="time-block">
                    <span class="time-value" id="mins">00</span>
                    <span class="time-label">Min</span>
                </div>
                <div class="time-block">
                    <span class="time-value" id="secs">00</span>
                    <span class="time-label">Sec</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // BACKGROUND ROTATION
        const slides = document.querySelectorAll('.slide');
        let index = 0;

        function rotateImages() {
            slides[index].classList.remove('active');
            index = (index + 1) % slides.length;
            slides[index].classList.add('active');
        }
        setInterval(rotateImages, 5000);

        // COUNTDOWN TIMER TO MAY 1, 2026
        const targetDate = new Date("May 1, 2026 00:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerHTML = d.toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = h.toString().padStart(2, '0');
            document.getElementById("mins").innerHTML = m.toString().padStart(2, '0');
            document.getElementById("secs").innerHTML = s.toString().padStart(2, '0');

            if (diff < 0) {
                document.getElementById("timer").innerHTML = "WE ARE LIVE";
            }
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>

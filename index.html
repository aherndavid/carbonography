<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autofacts-Bespoke | Vehicle Image Generator v1.5</title>
<style>
  :root {
    --dark-red: #8b0000;
    --off-white: #f5f5f5;
    --grey: #2c2c2c;
    --black: #000000;
    --border-color: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Segoe UI', Helvetica, sans-serif; 
    background: var(--black); 
    color: var(--off-white); 
    height: 100vh; 
    overflow: hidden; 
    font-size: 16px; 
  }
  
  #app { display: flex; flex-direction: column; height: 100vh; width: 100%; }

  /* Toolbar */
  #top-toolbar { 
    display: flex; 
    align-items: center; 
    gap: 20px; 
    padding: 15px 30px; 
    background: var(--grey); 
    border-bottom: 3px solid var(--dark-red); 
    flex-shrink: 0; 
  }
  #top-toolbar span.label { font-size: 22px; color: var(--off-white); letter-spacing: 1px; font-weight: 800; text-transform: uppercase; }
  #version-badge { font-size: 12px; color: var(--dark-red); font-family: 'Courier New', monospace; font-weight: bold; background: var(--black); padding: 2px 8px; border-radius: 4px; }
  
  .header-logo { height: 40px; margin-left: auto; filter: drop-shadow(0 0 5px rgba(255,255,255,0.1)); }
  
  #main { display: flex; flex: 1; min-height: 0; }

  /* Left Panel: Configuration */
  #left { width: 520px; display: flex; flex-direction: column; border-right: 2px solid var(--grey); background: #0f0f0f; overflow-y: auto; }
  .panel-header { padding: 15px 20px; background: var(--dark-red); border-bottom: 1px solid var(--black); font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: var(--off-white); font-weight: bold; position: sticky; top: 0; z-index: 10; }
  
  /* Visual Rig Area */
  #rig-container { 
    height: 350px; background: radial-gradient(circle, #333 0%, var(--black) 100%); 
    position: relative; border-bottom: 2px solid var(--grey); overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  #vehicle-aerial { width: 160px; opacity: 0.9; filter: drop-shadow(0 0 20px rgba(139,0,0,0.3)); z-index: 1; }
  
  /* The Dynamic Camera Indicator - Container for Positioning */
  #camera-indicator {
    position: absolute; 
    width: 70px; /* Container size matching camera asset needs */
    height: 70px;
    transition: all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex; 
    align-items: center; 
    justify-content: center;
    pointer-events: none;
    z-index: 10; /* Above car */
  }

  /* The actual camera asset */
  #camera-icon {
    width: 100%;
    height: auto;
    /* Red glow to match color scheme */
    filter: drop-shadow(0 0 8px var(--dark-red)); 
  }

  .form-container { padding: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .full-width { grid-column: span 2; }

  label { font-size: 12px; color: #999; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
  input, select { 
    background: var(--grey); 
    border: 1px solid var(--border-color); 
    color: var(--off-white); 
    padding: 12px; 
    border-radius: 6px; 
    font-size: 15px; 
    outline: none; 
    transition: 0.3s;
  }
  input:focus, select:focus { border-color: var(--dark-red); background: #333; }

  .toggle-grid { grid-column: span 2; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: var(--grey); padding: 20px; border-radius: 8px; border: 1px solid #444; }
  .checkbox-group { display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .checkbox-group input { width: 18px; height: 18px; accent-color: var(--dark-red); cursor: pointer; }
  .checkbox-group label { cursor: pointer; color: var(--off-white); text-transform: none; font-size: 14px; font-weight: 600; }

  /* Right Panel: Output */
  #right { flex: 1; display: flex; flex-direction: column; background: var(--black); }
  #output-area { 
    flex: 1; padding: 50px; 
    font-family: 'Consolas', 'Monaco', monospace; 
    color: var(--off-white); 
    line-height: 1.8; 
    font-size: 18px; 
    white-space: pre-wrap; 
    overflow-y: auto; 
    border-left: 1px solid var(--grey);
  }
  
  #bottom-bar { padding: 20px 30px; background: var(--grey); border-top: 3px solid var(--dark-red); display: flex; gap: 20px; align-items: center; }
  .btn { 
    padding: 14px 28px; 
    border-radius: 6px; 
    border: none; 
    cursor: pointer; 
    font-weight: 800; 
    font-size: 14px; 
    text-transform: uppercase; 
    letter-spacing: 1px;
    transition: 0.2s; 
  }
  .btn-primary { background: var(--dark-red); color: var(--off-white); }
  .btn-primary:hover { background: #b30000; transform: translateY(-2px); }
  
  .btn-outline { background: transparent; border: 2px solid var(--dark-red); color: var(--off-white); }
  .btn-outline:hover { background: var(--dark-red); }

  #status-msg { font-size: 12px; color: #777; font-weight: bold; text-transform: uppercase; margin-left: auto; }
  #cursor { display: inline-block; width: 12px; height: 22px; background: var(--dark-red); animation: blink 1s infinite; vertical-align: middle; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div id="app">
  <div id="top-toolbar">
    <span class="label">Autofacts-Bespoke</span>
    <span id="version-badge">v1.5 ENGINE</span>
    <img class="header-logo" src="https://raw.githubusercontent.com/aherndavid/autofacts/main/assets/autofacts-logo.png" alt="Autofacts Logo">
  </div>

  <div id="main">
    <div id="left">
      <div id="rig-container">
        <img id="vehicle-aerial" src="https://raw.githubusercontent.com/aherndavid/autofacts/main/assets/car-above.png" alt="Vehicle Aerial">
        
        <div id="camera-indicator">
          <img id="camera-icon" src="https://raw.githubusercontent.com/aherndavid/autofacts/main/assets/camera.png" alt="Camera Position">
        </div>
      </div>

      <div class="panel-header">Studio Controls</div>
      <div class="form-container">
        <div class="form-group full-width">
          <label>Vehicle Model</label>
          <input type="text" id="model" placeholder="Porsche 911 GT3 RS" oninput="autoGenerate()">
        </div>
        
        <div class="form-group">
          <label>Lighting</label>
          <select id="lighting" onchange="autoGenerate()">
            <option value="Daytime, bright natural sunlight with harsh shadows">Daytime</option>
            <option value="Nighttime, cinematic street lighting and neon glows">Nighttime</option>
            <option value="Sunrise, golden hour orange light and soft shadows">Sunrise</option>
          </select>
        </div>

        <div class="form-group">
          <label>Wheel Diameter</label>
          <select id="wheelSize" onchange="autoGenerate()">
            <script>
              for(let i=13; i<=22; i++) {
                document.write(`<option value="${i}-inch">${i}" Alloy</option>`);
              }
            </script>
          </select>
        </div>

        <div class="form-group full-width">
          <label>Camera Perspective</label>
          <select id="angle" onchange="autoGenerate()">
            <option value="Front 3/4 hero shot" data-x="100" data-y="-100" data-rot="135">Hero Shot (Front 3/4)</option>
            <option value="Low-slung side profile" data-x="150" data-y="0" data-rot="180">Side Profile (Passenger)</option>
            <option value="Aggressive rear 3/4" data-x="100" data-y="100" data-rot="225">Rear 3/4 View</option>
            <option value="Crouching low-angle front center shot" data-x="0" data-y="-140" data-rot="90">Front Center (Crouched)</option>
            <option value="Crouching low-angle rear center shot" data-x="0" data-y="140" data-rot="270">Rear Center (Crouched)</option>
            <option value="Rear side angle shot" data-x="-100" data-y="100" data-rot="315">Rear Side Angle (Driver Rear)</option>
            <option value="Top-down bird's eye view" data-x="0" data-y="0" data-rot="90">Top Down</option>
          </select>
        </div>

        <div class="toggle-grid">
          <div class="checkbox-group"><input type="checkbox" id="lightsOn" onchange="autoGenerate()"><label>Headlights On</label></div>
          <div class="checkbox-group"><input type="checkbox" id="motion" onchange="autoGenerate()"><label>Wheel Motion</label></div>
          <div class="checkbox-group"><input type="checkbox" id="convertible" onchange="autoGenerate()"><label>Convertible</label></div>
          <div class="checkbox-group"><input type="checkbox" id="lowered" onchange="autoGenerate()"><label>Suspension Lowered</label></div>
          <div class="checkbox-group"><input type="checkbox" id="race" onchange="autoGenerate()"><label>Race Variant</label></div>
          <div class="checkbox-group"><input type="checkbox" id="tint" onchange="autoGenerate()"><label>Window Tint</label></div>
          <div class="checkbox-group" style="grid-column: span 2;"><input type="checkbox" id="leather" onchange="autoGenerate()"><label>Premium Leather Interior</label></div>
        </div>
      </div>
    </div>

    <div id="right">
      <div class="panel-header">Generated Image Prompt</div>
      <div id="output-area">Initialize System...<span id="cursor"></span></div>
    </div>
  </div>

  <div id="bottom-bar">
    <button class="btn btn-primary" onclick="copyPrompt()">Copy Prompt</button>
    <button class="btn btn-outline" onclick="exportFile()">Export .TXT</button>
    <div id="status-msg">AUTOFACTS-BESPOKE // SYSTEM OPERATIONAL</div>
  </div>
</div>

<script>
  let fullPromptText = "";

  function autoGenerate() {
    const model = document.getElementById('model').value || "[VEHICLE]";
    const lighting = document.getElementById('lighting').value;
    const wheelSize = document.getElementById('wheelSize').value;
    const angleDropdown = document.getElementById('angle');
    const angle = angleDropdown.value;
    
    // Update Camera Rig
    const opt = angleDropdown.options[angleDropdown.selectedIndex];
    const x = opt.getAttribute('data-x');
    const y = opt.getAttribute('data-y');
    let rot = parseFloat(opt.getAttribute('data-rot'));

    const indicator = document.getElementById('camera-indicator');
    
    // Position the container
    let transformString = `translate(${x}px, ${y}px)`;
    
    // Apply Rotation so lens points inward.
    // The asset lens is at 12 o'clock relative to the image bounds.
    // CSS rotate(0deg) faces East (3 o'clock). 
    // We add 90 degrees to align the 12 o'clock lens with the CSS 3 o'clock standard.
    let adjustedRot = rot + 90;
    
    transformString += ` rotate(${adjustedRot}deg)`;
    
    // Ensure rotation is around center, and offset the container's top-left positioning
    transformString += ` translate(-50%, -50%)`;

    indicator.style.transform = transformString;

    // Process Mods
    let mods = [];
    if(document.getElementById('lightsOn').checked) mods.push("headlights and taillights turned on with realistic bloom");
    if(document.getElementById('motion').checked) mods.push("motion-blurred spinning wheels");
    if(document.getElementById('convertible').checked) mods.push("convertible top retracted");
    if(document.getElementById('lowered').checked) mods.push("slammed lowered suspension");
    if(document.getElementById('race').checked) mods.push("racing-specification aero, widebody kit, and rear wing");
    if(document.getElementById('tint').checked) mods.push("limo-style dark tinted windows");
    
    const interior = document.getElementById('leather').checked ? "luxurious quilted leather" : "performance textile";
    
    // Construct Prompt
    fullPromptText = `>> AUTOFACTS-BESPOKE-V1.5-GENERATED-STRING\n`;
    fullPromptText += `>> PERSPECTIVE: ${angle.toUpperCase()}\n\n`;
    
    fullPromptText += `A professional automotive studio photograph of a ${model}. `;
    fullPromptText += `The vehicle is captured from a ${angle}, emphasizing the ${wheelSize} custom rims. `;
    fullPromptText += `The lighting setup is ${lighting}. `;
    
    if(mods.length > 0) {
        fullPromptText += `Vehicle features include ${mods.join(', ')}. `;
    }
    
    fullPromptText += `Visible interior showcases ${interior} craftsmanship. `;
    fullPromptText += `High-end commercial quality, 8k resolution, Unreal Engine 5.4 render style, ray-traced reflections, sharp focus, vibrant colors, bokeh background.`;

    const output = document.getElementById('output-area');
    output.innerText = fullPromptText;
    
    const cursor = document.createElement('span');
    cursor.id = 'cursor';
    output.appendChild(cursor);
  }

  function copyPrompt() {
    const text = document.getElementById('output-area').innerText;
    navigator.clipboard.writeText(text);
    const msg = document.getElementById('status-msg');
    msg.innerText = "COPIED TO CLIPBOARD!";
    msg.style.color = "#f5f5f5";
    setTimeout(() => {
        msg.innerText = "AUTOFACTS-BESPOKE // SYSTEM OPERATIONAL";
        msg.style.color = "#777";
    }, 2000);
  }

  function exportFile() {
    if(!fullPromptText) return;
    const blob = new Blob([fullPromptText], { type: "text/plain" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const timestamp = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `Autofacts_Bespoke_Prompt_${timestamp}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  window.onload = autoGenerate;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbonography | Vehicle Image Generator v1.6</title>
<link rel="stylesheet" href="/assets/global.css">
<link rel="stylesheet" href="/assets/desktop.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700&family=Rajdhani:wght@700&family=Russo+One&family=Racing+Sans+One&family=Aldrich&family=Exo+2:wght@800&family=Michroma&display=swap" rel="stylesheet">
</head>
<body>

<div id="app">

  <div id="top-toolbar">
    <span class="logo-text">Carbonography</span>
    <span id="version-badge">v1.7 ENGINE</span>
    <img class="header-logo"
         src="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbonography-logo.png"
         alt="Carbonography Logo">
  </div>

  <div id="main">

    <div id="left">

      <div id="rig-container">
        <img id="vehicle-aerial"
             src="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/car-above.png"
             alt="Vehicle top-down view">
        <div id="camera-indicator">
          <img id="camera-icon"
               src="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/camera.png"
               alt="Camera position">
        </div>
      </div>

      <div id="form-scroll">
        <div class="panel-header">Vehicle</div>
        <div class="form-container">
          <div class="form-group full-width">
            <label for="model">Vehicle Model</label>
            <input type="text" id="model" placeholder="Porsche 911 GT3 RS">
          </div>
        </div>
      </div>

    </div>

    <div id="right">

      <div id="controls-panel">
        <div class="panel-header">Studio Controls</div>
        <div class="controls-inner">

          <div class="form-group">
            <label for="lighting">Lighting Mood</label>
            <select id="lighting">
              <option value="studio-high-key">Studio — High Key</option>
              <option value="studio-low-key">Studio — Low Key / Dramatic</option>
              <option value="neon-night">Neon Night</option>
              <option value="daytime-natural">Daytime Natural</option>
              <option value="golden-hour">Golden Hour / Sunrise</option>
              <option value="overcast">Overcast / Diffused</option>
            </select>
          </div>

          <div class="form-group">
            <label for="wheelSize">Wheel Diameter</label>
            <select id="wheelSize">
              <option value="factory-fitted OEM">Factory Fitted</option>
            </select>
          </div>

          <div class="form-group wide">
            <label for="angle">Camera Perspective</label>
            <select id="angle">
              <option value="Front 3/4 hero shot"                   data-x="130"  data-y="-230" data-rot="135">Hero Shot (Front 3/4)</option>
              <option value="Low-slung side profile"                 data-x="170"  data-y="0"    data-rot="180">Side Profile (Passenger)</option>
              <option value="Aggressive rear 3/4"                   data-x="130"  data-y="230"  data-rot="225">Rear 3/4 View</option>
              <option value="Crouching low-angle front center shot" data-x="0"    data-y="-280" data-rot="90" >Front Center (Crouched)</option>
              <option value="Crouching low-angle rear center shot"  data-x="0"    data-y="280"  data-rot="270">Rear Center (Crouched)</option>
              <option value="Rear side angle shot"                  data-x="-130" data-y="230"  data-rot="315">Rear Side Angle (Driver Rear)</option>
              <option value="Top-down bird's eye view"              data-x="0"    data-y="0"    data-rot="90" >Top Down</option>
            </select>
          </div>

          <div class="toggle-inline">
            <div class="checkbox-group"><input type="checkbox" id="lightsOn"><label for="lightsOn">Headlights On</label></div>
            <div class="checkbox-group"><input type="checkbox" id="motion"><label for="motion">Wheel Motion</label></div>
            <div class="checkbox-group"><input type="checkbox" id="convertible"><label for="convertible">Convertible</label></div>
            <div class="checkbox-group"><input type="checkbox" id="lowered"><label for="lowered">Suspension Lowered</label></div>
            <div class="checkbox-group"><input type="checkbox" id="race"><label for="race">Race Variant</label></div>
            <div class="checkbox-group"><input type="checkbox" id="tint"><label for="tint">Window Tint</label></div>
            <div class="checkbox-group"><input type="checkbox" id="leather"><label for="leather">Leather Interior</label></div>
          </div>

        </div>

        <!-- Colour -->
        <div class="panel-header">Colour</div>
        <div class="controls-inner colour-row">

          <div class="colour-group">
            <label>Exterior Colour</label>
            <div class="colour-input-row">
              <input type="color" id="extColourPicker" value="#1a1a1a">
              <input type="text"  id="extColourHex"    value="#1a1a1a" maxlength="7" placeholder="#000000" class="hex-input">
              <input type="text"  id="extColourName"   placeholder="e.g. Obsidian Black" class="colour-name-input">
            </div>
          </div>

          <div class="colour-group">
            <label>Interior Colour</label>
            <div class="colour-input-row">
              <input type="color" id="intColourPicker" value="#2c1a0e">
              <input type="text"  id="intColourHex"    value="#2c1a0e" maxlength="7" placeholder="#000000" class="hex-input">
              <input type="text"  id="intColourName"   placeholder="e.g. Cognac Tan" class="colour-name-input">
            </div>
          </div>

        </div>

        <!-- Number Plate -->
        <div class="panel-header">Number Plate</div>
        <div class="controls-inner plate-row">

          <div class="form-group">
            <label for="plateStyle">Plate Style</label>
            <select id="plateStyle">
              <option value="none">No Plate / Hidden</option>
              <option value="uk">UK — White &amp; Yellow</option>
              <option value="us">US — State Style</option>
              <option value="eu">EU — White with Blue Band</option>
              <option value="custom">Custom / Other</option>
            </select>
          </div>

          <div class="form-group" id="plate-chars-group" style="display:none;">
            <label for="plateChars">Plate Characters</label>
            <div class="plate-input-wrap">
              <input type="text" id="plateChars" placeholder="AB12 CDE" maxlength="12" class="plate-chars-input" autocomplete="off" spellcheck="false">
              <div id="plate-preview-uk"     class="plate-preview plate-uk"     style="display:none;"></div>
              <div id="plate-preview-us"     class="plate-preview plate-us"     style="display:none;"></div>
              <div id="plate-preview-eu"     class="plate-preview plate-eu"     style="display:none;"></div>
              <div id="plate-preview-custom" class="plate-preview plate-custom" style="display:none;"></div>
            </div>
          </div>

        </div>

        <!-- Location -->
        <div class="panel-header">Location &amp; Background</div>
        <div class="controls-inner location-row">

          <div class="form-group">
            <label for="location">Background Location</label>
            <select id="location">
              <option value="studio-white">Studio (White)</option>
              <option value="studio-black">Studio (Black)</option>
              <option value="racetrack">Racetrack</option>
              <option value="london-street">London Street</option>
              <option value="desert">Desert</option>
              <option value="transparent">Transparent / Cutout</option>
              <option value="custom">Custom</option>
            </select>
          </div>

          <!-- Lighting conflict warning -->
          <div id="lighting-warning" style="display:none;">
            <div class="conflict-warning">
              ⚠ <strong>Lighting conflict detected.</strong> <span id="warning-text"></span>
            </div>
          </div>

          <div id="custom-location-group" style="display:none;">
            <div class="form-group">
              <label for="customLocation">Describe Your Background</label>
              <input type="text" id="customLocation" placeholder="e.g. Snowy mountain pass at dusk, pine trees lining the road">
            </div>
          </div>

          <div class="overlay-text-group">
            <div class="form-group">
              <label for="overlayText">Overlay Text (optional)</label>
              <input type="text" id="overlayText" placeholder="e.g. GT3 RS — Born on Track">
            </div>
            <div class="form-group">
              <label for="overlayFont">Text Style</label>
              <select id="overlayFont">
                <option value="" data-family="">— None —</option>
                <option value="Bebas Neue, impact style, tall condensed uppercase lettering" data-family="Bebas Neue">Bebas Neue — Bold &amp; Condensed</option>
                <option value="Orbitron, futuristic digital display font" data-family="Orbitron">Orbitron — Futuristic HUD</option>
                <option value="Rajdhani, sharp angular modern sans-serif" data-family="Rajdhani">Rajdhani — Sharp &amp; Angular</option>
                <option value="Russo One, strong geometric slab font" data-family="Russo One">Russo One — Geometric Slab</option>
                <option value="Racing Sans One, motorsport-inspired italic font" data-family="Racing Sans One">Racing Sans One — Motorsport</option>
                <option value="Aldrich, clean technical monospaced-style font" data-family="Aldrich">Aldrich — Technical &amp; Clean</option>
                <option value="Exo 2, sporty wide sci-fi font" data-family="Exo 2">Exo 2 — Sporty &amp; Wide</option>
                <option value="Michroma, narrow technical aerospace font" data-family="Michroma">Michroma — Aerospace</option>
              </select>
            </div>
          </div>

          <div id="font-preview-wrap" style="display:none;">
            <div id="font-preview"></div>
          </div>

        </div>

        <!-- Output spec -->
        <div class="controls-inner output-spec-row">

          <div class="form-group">
            <label for="outputType">Output Type</label>
            <select id="outputType">
              <option value="image">Image</option>
              <option value="video">Video</option>
            </select>
          </div>

          <div class="form-group">
            <label for="orientation">Orientation</label>
            <select id="orientation">
              <option value="landscape">Landscape</option>
              <option value="portrait">Portrait</option>
            </select>
          </div>

          <div class="form-group">
            <label for="resolution">Resolution</label>
            <select id="resolution">
              <option value="standard">Standard — 1080p</option>
              <option value="high">High — 4K</option>
              <option value="ultra">Ultra — 8K</option>
            </select>
          </div>

          <div class="form-group">
            <label for="quality">Detail Level</label>
            <select id="quality">
              <option value="standard">Standard</option>
              <option value="high">High Detail</option>
              <option value="extreme">Extreme Detail</option>
            </select>
          </div>

          <div class="toggle-inline" id="video-options" style="display:none;">
            <div class="checkbox-group"><input type="checkbox" id="slowmo"><label for="slowmo">Slow Motion</label></div>
            <div class="checkbox-group"><input type="checkbox" id="dolly"><label for="dolly">Dolly Move</label></div>
            <div class="checkbox-group"><input type="checkbox" id="orbit"><label for="orbit">Orbit Shot</label></div>
            <div class="checkbox-group"><input type="checkbox" id="drone"><label for="drone">Drone Flyover</label></div>
          </div>

        </div>

      </div><!-- /#controls-panel -->

      <div class="panel-header" id="output-panel-header">Generated Image Prompt</div>
      <div id="output-area">Initialize Carbonography System...<span id="cursor"></span></div>

    </div>

  </div>

  <div id="bottom-bar">
    <div id="status-msg">CARBONOGRAPHY // READY</div>
    <div id="bottom-bar-right">
      <button class="btn btn-outline" id="exportBtn">Export .TXT</button>
      <button class="btn btn-outline" id="copyBtn">Copy Prompt</button>
      <button class="btn btn-generator" id="ideogramBtn" title="Copies prompt then opens Ideogram — paste on arrival">⚡ Ideogram</button>
      <button class="btn btn-generator" id="leonardoBtn" title="Copies prompt then opens Leonardo.ai — paste on arrival">⚡ Leonardo</button>
    </div>
  </div>

</div>

<div id="generator-toast"></div>

<style>
  /* ── Carbon fibre texture ── */
  #top-toolbar {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: cover; background-position: center; background-repeat: repeat;
    position: relative; overflow: hidden; border-bottom: 3px solid #8b0000;
  }
  #top-toolbar::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.45); z-index:0; pointer-events:none; }
  #top-toolbar > * { position:relative; z-index:1; }

  #form-scroll {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: cover; background-position: center; background-repeat: repeat; position: relative;
  }
  #form-scroll::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:0; pointer-events:none; }
  #form-scroll > * { position:relative; z-index:1; }

  #controls-panel {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: cover; background-position: center; background-repeat: repeat; position: relative;
  }
  #controls-panel::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:0; pointer-events:none; }
  #controls-panel > * { position:relative; z-index:1; }

  #bottom-bar {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: cover; background-position: center; background-repeat: repeat; position: relative;
  }
  #bottom-bar::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:0; pointer-events:none; }

  #rig-container { background: radial-gradient(ellipse 60% 75% at 50% 50%, #2a2a2a 0%, #000 100%) !important; }
  #output-area   { background: #0f0f0f !important; }

  /* ── Conflict warning ── */
  .conflict-warning {
    background: rgba(139,0,0,0.25);
    border: 1px solid #8b0000;
    border-radius: 6px;

    color: #ffaaaa;
    line-height: 1.5;
  }
  .conflict-warning strong { color: #ff6666; }

  /* ── Plate section ── */
  .plate-row { display:flex; align-items:flex-start; gap:20px; flex-wrap:wrap; }
  .plate-row .form-group { min-width:180px; }
  .plate-input-wrap { display:flex; flex-direction:column; gap:10px; }

  .plate-chars-input {
    font-family: 'Courier New', monospace !important;
    font-size: 20px !important; font-weight: 900 !important;

  }

  .plate-preview {
    display: inline-flex; align-items: center; justify-content: center;

  }

    background: #f5f0c8; color: #111; border-color: #bbb;

  }
  .plate-custom { background:#1a1a1a; color:#f5f5f5; font-family:'Arial Black',sans-serif; border-color:#555; border-radius:4px; }

  /* ── Location section ── */

  /* ── Generator buttons ── */
  .btn-generator {

    background: linear-gradient(135deg, #2a2a4e 0%, #26316e 50%, #1f4480 100%);

    font-family:var(--font-ui); letter-spacing:0.5px; opacity:0; transition:all 0.3s ease;

  }
  #generator-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── Checkbox fix ── */
  .checkbox-group input[type="checkbox"] {
    width:18px; height:18px; min-width:18px; accent-color:#8b0000;
    cursor:pointer; flex-shrink:0; opacity:1; -webkit-appearance:checkbox; appearance:checkbox;
  }

  /* ── Colour ── */
  .colour-row { display:flex; gap:24px; flex-wrap:wrap; }

  input[type="color"]::-webkit-color-swatch { border:none; border-radius:4px; }

  .colour-name-input { flex:1; font-size:14px; }
</style>

<script>
  const WHEEL_MIN = 13;
  const WHEEL_MAX = 22;
  const STATUS_RESET_MS = 2000;
  const $ = id => document.getElementById(id);
  let currentPrompt = '';

  // ── Lighting definitions ───────────────────────────────────────────────────
  // Each entry defines: the full prompt string, which locations are compatible,
  // and which locations cause a conflict (with a message explaining why).
  const LIGHTING_MAP = {
    'studio-high-key': {
      prompt:     'softbox lighting, high-key studio strobes, white fill cards, bright even illumination with minimal shadows, clean specular highlights on bodywork',
      goodWith:   ['studio-white', 'studio-black', 'transparent'],
      warnWith:   { 'neon-night': '', 'london-street': '', 'racetrack': '', 'desert': '', 'golden-hour': '' },
      label:      'Studio — High Key',
    },
    'studio-low-key': {
      prompt:     'dramatic low-key lighting, single hard key light, deep shadow gradients, sharp rim lighting separating car from background, moody chiaroscuro',
      goodWith:   ['studio-black', 'studio-white', 'transparent'],
      warnWith:   {},
      label:      'Studio — Low Key',
    },
    'neon-night': {
      prompt:     'cinematic nighttime lighting, vibrant neon sign glow, coloured light spill across bodywork, wet surface reflections, realistic bloom and lens flare on light sources, dark atmospheric shadows',
      goodWith:   ['london-street', 'studio-black', 'racetrack'],
      warnWith:   {
        'studio-white': 'A white studio backdrop kills neon bloom. Switch to Studio (Black) or London Street for this lighting mood.',
        'desert':       'Desert locations are daylight environments. Neon night lighting will conflict — try Golden Hour or Daytime instead.',
        'transparent':  'Transparent cutouts require neutral lighting. Neon glow will tint the cutout edges.',
      },
      label:      'Neon Night',
    },
    'daytime-natural': {
      prompt:     'bright natural daylight, harsh directional sunlight, crisp hard shadows, clear blue sky ambient fill, realistic outdoor illumination',
      goodWith:   ['racetrack', 'desert', 'london-street', 'custom'],
      warnWith:   {
        'studio-white': 'Natural sunlight and a studio backdrop are contradictory environments. Consider Racetrack or Desert instead.',
        'studio-black': 'Natural sunlight and a dark studio backdrop are contradictory. Consider an outdoor location.',
      },
      label:      'Daytime Natural',
    },
    'golden-hour': {
      prompt:     'golden hour warm directional sunlight, long soft shadows, orange and amber light spilling across body panels, warm atmospheric haze, gentle lens flare',
      goodWith:   ['racetrack', 'desert', 'london-street', 'custom'],
      warnWith:   {
        'studio-white': 'Golden hour warm tones will clash with a neutral white studio. Consider an outdoor location.',
        'studio-black': 'Golden hour is an outdoor natural light — a dark studio will create a contradiction.',
      },
      label:      'Golden Hour',
    },
    'overcast': {
      prompt:     'overcast diffused lighting, flat even sky illumination, soft shadowless light, subtle cool-grey ambient tone, clean reflections across all panels',
      goodWith:   ['racetrack', 'desert', 'london-street', 'studio-white', 'custom', 'transparent'],
      warnWith:   {},
      label:      'Overcast / Diffused',
    },
  };

  // ── Location definitions ───────────────────────────────────────────────────
  const LOCATION_MAP = {
    'studio-white':  { prompt: 'pure white seamless paper backdrop, professional automotive photography studio, clean reflective white floor', label: 'Studio (White)' },
    'studio-black':  { prompt: 'pure black seamless backdrop, darkened professional studio, polished dark floor with subtle car reflection', label: 'Studio (Black)' },
    'racetrack':     { prompt: 'FIA-grade racing circuit, pit lane straight, dark tarmac with painted race markings and start/finish lines, grandstands softly blurred in background, motorsport atmosphere', label: 'Racetrack' },
    'london-street': { prompt: 'gritty London city street, rain-soaked wet cobblestones reflecting ambient light, iconic red double-decker bus blurred in background, urban night atmosphere, glowing street lamps', label: 'London Street' },
    'desert':        { prompt: 'vast open desert landscape, cracked salt flat stretching to the horizon, dramatic cloudless sky, golden dust haze in the air, remote and isolated', label: 'Desert' },
    'transparent':   { prompt: 'fully transparent background, vehicle completely isolated with no backdrop, clean cutout with no colour cast on edges', label: 'Transparent / Cutout' },
    'custom':        { prompt: null, label: 'Custom' },
  };

  // ── Quality definitions ────────────────────────────────────────────────────
  // Per the AI feedback: prioritise descriptive photography/render terms over raw specs
  const QUALITY_MAP = {
    standard: {
      photo:  'commercial automotive photography quality, sharp focus throughout, clean colour grading, professional retouching',
      render: 'high-quality CGI render, clean anti-aliasing, accurate materials',
    },
    high: {
      photo:  'macro photography-grade sharpness, micro-texture detail on every panel, subsurface scattering in paint depth, HDR tonal range, studio-grade colour accuracy, hyper-realistic reflections',
      render: 'photorealistic CGI, subsurface scattering on paint, ray-traced reflections and shadows, micro-detail geometry, HDR lighting, production-quality render',
    },
    extreme: {
      photo:  'extreme macro photography, every panel pore, scratch and surface imperfection visible, subsurface scattering deep in paint lacquer, museum-quality reference photography, lens aberration realism, sensor-accurate noise, beyond-8K detail density',
      render: 'reference-grade photorealism, every surface molecule rendered, subsurface scattering through clear coat, ray-traced global illumination, ultra-detail displacement mapping, film-grain realism, beyond-8K render quality',
    },
  };

  // ── Resolution definitions ─────────────────────────────────────────────────
  const RESOLUTION_MAP = {
    standard: { label: '1920×1080', tag: '1080p full HD, high detail' },
    high:     { label: '3840×2160', tag: '4K ultra HD, very high detail' },
    ultra:    { label: '7680×4320', tag: '8K resolution, extreme detail, macro photography sharpness' },
  };

  const ORIENTATION_MAP = {
    landscape: { label: 'landscape', ratio: '16:9 aspect ratio, horizontal widescreen composition' },
    portrait:  { label: 'portrait',  ratio: '9:16 aspect ratio, vertical portrait composition' },
  };

  const VIDEO_MAP = {
    slowmo: 'ultra slow-motion capture at 240fps',
    dolly:  'cinematic dolly push-in camera move',
    orbit:  '360-degree orbit shot around the vehicle',
    drone:  'sweeping drone flyover aerial cinematography',
  };

  const PLATE_STYLES = {
    uk:     { label: 'UK-style white number plate with Charles Wright typeface black lettering',      previewId: 'plate-preview-uk' },
    us:     { label: 'US-style state licence plate with bold sans-serif characters',                  previewId: 'plate-preview-us' },
    eu:     { label: 'EU-style white number plate with blue country identification band',              previewId: 'plate-preview-eu' },
    custom: { label: 'custom-style number plate',                                                     previewId: 'plate-preview-custom' },
  };

  // ── Wheels ─────────────────────────────────────────────────────────────────
  (function populateWheels() {
    const sel = $('wheelSize');
    for (let i = WHEEL_MIN; i <= WHEEL_MAX; i++) {
      const opt = document.createElement('option');
      opt.value = `${i}-inch`;
      opt.textContent = `${i}" Alloy`;
      sel.appendChild(opt);
    }
  })();

  // ── Colour sync ────────────────────────────────────────────────────────────
  function syncColour(pickerId, hexId) {
    const picker = $(pickerId), hex = $(hexId);
    picker.addEventListener('input', () => { hex.value = picker.value.toUpperCase(); autoGenerate(); });
    hex.addEventListener('input', () => {
      if (/^#[0-9a-fA-F]{6}$/.test(hex.value.trim())) picker.value = hex.value.trim();
      autoGenerate();
    });
  }
  syncColour('extColourPicker', 'extColourHex');
  syncColour('intColourPicker', 'intColourHex');
  $('extColourName').addEventListener('input', autoGenerate);
  $('intColourName').addEventListener('input', autoGenerate);

  // Build a rich colour description: "Glossy Obsidian Black (#1A1A1A)" — descriptive name first, hex as reference
  function colourDesc(hexId, nameId) {
    const hex  = $(hexId).value.trim().toUpperCase();
    const name = $(nameId).value.trim();
    // If user provided a name, use it descriptively with hex as a reference anchor
    return name ? `${name} (hex reference ${hex})` : `colour hex ${hex}`;
  }

  // ── Lighting / location conflict check ────────────────────────────────────
  function checkConflict() {
    const lightKey = $('lighting').value;
    const locKey   = $('location').value;
    const lighting = LIGHTING_MAP[lightKey];
    const warning  = $('lighting-warning');
    const warnText = $('warning-text');

    if (lighting && lighting.warnWith && lighting.warnWith[locKey]) {
      warnText.textContent = lighting.warnWith[locKey];
      warning.style.display = 'block';
    } else {
      warning.style.display = 'none';
    }
  }

  // ── Plate preview ──────────────────────────────────────────────────────────
  function updatePlatePreview() {
    const style    = $('plateStyle').value;
    const chars    = $('plateChars').value.trim().toUpperCase();
    const charsGrp = $('plate-chars-group');
    ['uk','us','eu','custom'].forEach(s => { $('plate-preview-' + s).style.display = 'none'; });
    if (style === 'none') {
      charsGrp.style.display = 'none';
    } else {
      charsGrp.style.display = 'block';
      if (chars) {
        const prev = $(PLATE_STYLES[style].previewId);
        prev.textContent = chars;
        prev.style.display = 'inline-flex';
      }
    }
    autoGenerate();
  }
  $('plateStyle').addEventListener('change', updatePlatePreview);
  $('plateChars').addEventListener('input', () => {
    $('plateChars').value = $('plateChars').value.toUpperCase();
    updatePlatePreview();
  });

  // ── Location / lighting listeners ──────────────────────────────────────────
  $('location').addEventListener('change', () => {
    $('custom-location-group').style.display = $('location').value === 'custom' ? 'block' : 'none';
    checkConflict();
    autoGenerate();
  });
  $('lighting').addEventListener('change', () => { checkConflict(); autoGenerate(); });
  $('customLocation').addEventListener('input', autoGenerate);

  // ── Font preview ───────────────────────────────────────────────────────────
  function updateFontPreview() {
    const sel    = $('overlayFont');
    const family = sel.options[sel.selectedIndex].getAttribute('data-family');
    const text   = $('overlayText').value.trim();
    const wrap   = $('font-preview-wrap');
    const prev   = $('font-preview');
    if (family && text) {
      prev.style.fontFamily = `'${family}', sans-serif`;
      prev.textContent = text;
      wrap.style.display = 'block';
    } else {
      wrap.style.display = 'none';
    }
    autoGenerate();
  }
  $('overlayFont').addEventListener('change', updateFontPreview);
  $('overlayText').addEventListener('input', updateFontPreview);

  // ── Video toggle ───────────────────────────────────────────────────────────
  $('outputType').addEventListener('change', () => {
    const isVideo = $('outputType').value === 'video';
    $('video-options').style.display = isVideo ? 'flex' : 'none';
    $('output-panel-header').textContent = isVideo ? 'Generated Video Prompt' : 'Generated Image Prompt';
    autoGenerate();
  });

  // ── Camera indicator ───────────────────────────────────────────────────────
  function updateCameraIndicator(opt) {
    const x   = parseFloat(opt.getAttribute('data-x'));
    const y   = parseFloat(opt.getAttribute('data-y'));
    const rot = parseFloat(opt.getAttribute('data-rot')) + 90;
    $('camera-indicator').style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
  }

  // ── Prompt builder ─────────────────────────────────────────────────────────
  function buildPrompt() {
    const model      = $('model').value.trim() || '[VEHICLE]';
    const lightKey   = $('lighting').value;
    const lighting   = LIGHTING_MAP[lightKey];
    const wheelVal   = $('wheelSize').value;
    const isFactory  = wheelVal === 'factory-fitted OEM';
    const wheelText  = isFactory ? 'factory-fitted OEM wheels' : `${wheelVal} custom alloy rims`;
    const angleEl    = $('angle');
    const angle      = angleEl.value;
    const isLeather  = $('leather').checked;
    const interior   = isLeather ? 'luxurious quilted leather' : 'performance textile';
    const outputType = $('outputType').value;
    const isVideo    = outputType === 'video';
    const orientation= ORIENTATION_MAP[$('orientation').value];
    const resolution = RESOLUTION_MAP[$('resolution').value];
    const qualKey    = $('quality').value;
    const quality    = QUALITY_MAP[qualKey][isVideo ? 'render' : 'photo'];

    const extColour  = colourDesc('extColourHex', 'extColourName');
    const intColour  = colourDesc('intColourHex', 'intColourName');

    // Plate
    const plateStyle = $('plateStyle').value;
    const plateChars = $('plateChars').value.trim().toUpperCase();
    const hasPlate   = plateStyle !== 'none' && plateChars.length > 0;

    // Location — if custom, use the text field; otherwise use the map
    const locKey     = $('location').value;
    const locData    = LOCATION_MAP[locKey];
    const locationStr = locKey === 'custom'
      ? ($('customLocation').value.trim() || 'a custom environment')
      : locData.prompt;

    // Overlay
    const overlayText = $('overlayText').value.trim();
    const fontSel     = $('overlayFont');
    const fontVal     = fontSel.value;
    const fontFamily  = fontSel.options[fontSel.selectedIndex].getAttribute('data-family');

    const mods = [
      $('lightsOn').checked    && 'headlights and taillights illuminated with realistic photon bloom',
      $('motion').checked      && 'motion-blurred spinning wheels conveying speed',
      $('convertible').checked && 'convertible soft-top retracted',
      $('lowered').checked     && 'slammed lowered suspension, minimal wheel arch gap',
      $('race').checked        && 'full racing-specification aerodynamics, widebody kit, large rear wing',
      $('tint').checked        && 'limo-style dark privacy window tinting',
    ].filter(Boolean);

    const videoMods = isVideo
      ? ['slowmo','dolly','orbit','drone'].filter(id => $(id).checked).map(id => VIDEO_MAP[id])
      : [];

    updateCameraIndicator(angleEl.options[angleEl.selectedIndex]);

    const typeLabel = isVideo ? 'VIDEO' : 'IMAGE';

    // ── Header block ──
    let prompt  = `>> CARBONOGRAPHY-V1.7-STRING\n`;
    prompt     += `>> TYPE: ${typeLabel} | ORIENTATION: ${orientation.label.toUpperCase()} | RESOLUTION: ${resolution.label}\n`;
    prompt     += `>> PERSPECTIVE: ${angle.toUpperCase()}\n`;
    prompt     += `>> LIGHTING: ${lighting.label.toUpperCase()}\n`;
    prompt     += `>> LOCATION: ${locData ? locData.label.toUpperCase() : 'CUSTOM'}\n`;
    prompt     += `>> EXT COLOUR: ${extColour} | INT COLOUR: ${intColour}\n`;
    if (hasPlate) prompt += `>> PLATE: "${plateChars}" — ${PLATE_STYLES[plateStyle].label}\n`;
    if (overlayText && fontVal) prompt += `>> OVERLAY TEXT: "${overlayText}" in ${fontFamily} typeface\n`;
    prompt     += `\n`;

    // ── Subject line ──
    prompt += isVideo
      ? `Cinematic automotive ${orientation.label} video of a ${model}. `
      : `Professional automotive ${orientation.label} photograph of a ${model}. `;

    // ── Colour (descriptive name first, hex as reference anchor) ──
    prompt += `Exterior finished in ${extColour} with deep glossy clear coat, subsurface scattering visible through paint depth. `;
    prompt += `Interior trimmed in ${intColour} ${interior}. `;

    // ── Camera & wheels ──
    prompt += `Captured from a ${angle}. `;
    prompt += isFactory
      ? `Wheels are factory-fitted OEM specification. `
      : `Fitted with ${wheelText}. `;

    // ── Lighting (no contradiction — lighting prompt is chosen to match environment) ──
    prompt += `Lighting: ${lighting.prompt}. `;

    // ── Background / location ──
    prompt += `Background: ${locationStr}. `;

    // ── Plate ──
    if (hasPlate) {
      prompt += `The vehicle bears a clearly legible ${PLATE_STYLES[plateStyle].label} reading "${plateChars}", correctly mounted, with photorealistic raised characters and authentic plate materials. `;
    }

    // ── Modifications ──
    if (mods.length) prompt += `Vehicle specification includes: ${mods.join(', ')}. `;

    // ── Video camera moves ──
    if (videoMods.length) prompt += `Camera direction: ${videoMods.join(', ')}. `;

    // ── Overlay text ──
    if (overlayText && fontVal) {
      prompt += `Typography overlay: the text "${overlayText}" rendered in ${fontVal} typeface, bold and large, composited naturally into the image. `;
    }

    // ── Technical quality tail — descriptive photography terms first, specs as reference ──
    if (isVideo) {
      prompt += `Technical: ${resolution.tag}, ${quality}, cinematic colour grade, motion blur on moving elements, rack focus depth of field, photorealistic materials throughout.`;
    } else {
      prompt += `Technical: ${resolution.tag}, ${quality}, crisp optical sharpness, accurate colour reproduction, photorealistic render.`;
    }

    return prompt;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function autoGenerate() {
    currentPrompt = buildPrompt();
    const output = $('output-area');
    output.textContent = currentPrompt;
    const cursor = document.createElement('span');
    cursor.id = 'cursor';
    output.appendChild(cursor);
  }

  // ── Status / toast / copy / export ────────────────────────────────────────
  function flashStatus(msg) {
    const el = $('status-msg');
    el.textContent = msg;
    setTimeout(() => { el.textContent = 'CARBONOGRAPHY // READY'; }, STATUS_RESET_MS);
  }

  function showToast(msg) {
    const t = $('generator-toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function openInGenerator(url, siteName) {
    if (!currentPrompt) { flashStatus('NO PROMPT TO SEND'); return; }
    navigator.clipboard.writeText(currentPrompt)
      .then(() => { showToast(`✓ Prompt copied — paste into ${siteName} when it opens`); setTimeout(() => window.open(url, '_blank'), 400); })
      .catch(() => { showToast(`⚠ Could not auto-copy — copy manually then paste into ${siteName}`); setTimeout(() => window.open(url, '_blank'), 800); });
  }

  $('ideogramBtn').addEventListener('click', () => openInGenerator('https://ideogram.ai/t/explore', 'Ideogram'));
  $('leonardoBtn').addEventListener('click', () => openInGenerator('https://app.leonardo.ai/', 'Leonardo.ai'));

  $('copyBtn').addEventListener('click', () => {
    if (!currentPrompt) return;
    navigator.clipboard.writeText(currentPrompt)
      .then(() => flashStatus('COPIED TO CLIPBOARD!'))
      .catch(() => flashStatus('COPY FAILED'));
  });

  $('exportBtn').addEventListener('click', () => {
    if (!currentPrompt) { flashStatus('NOTHING TO EXPORT'); return; }
    const blob = new Blob([currentPrompt], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url;
    a.download = `Carbonography_Prompt_${new Date().toISOString().slice(0,10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // ── Bind controls ──────────────────────────────────────────────────────────
  ['model', 'wheelSize', 'angle', 'orientation', 'resolution', 'quality', 'outputType',
   'lightsOn', 'motion', 'convertible', 'lowered', 'race', 'tint', 'leather',
   'slowmo', 'dolly', 'orbit', 'drone'
  ].forEach(id => {
    const el = $(id);
    el.addEventListener(el.type === 'checkbox' ? 'change' : 'input', autoGenerate);
  });

  document.addEventListener('DOMContentLoaded', () => { checkConflict(); autoGenerate(); });
</script>
</body>
</html>

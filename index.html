<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbonography | Vehicle Image Generator v1.7</title>
<link rel="stylesheet" href="/assets/global.css">
<link rel="stylesheet" href="/assets/desktop.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Orbitron:wght@700&family=Rajdhani:wght@700&family=Russo+One&family=Racing+Sans+One&family=Aldrich&family=Exo+2:wght@800&family=Michroma&display=swap" rel="stylesheet">
</head>
<body>

<div id="app">

  <div id="top-toolbar">
    <span class="logo-text">Carbonography</span>
    <span id="version-badge">v1.7 ENGINE</span>
    <img class="header-logo"
         src="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbonography-logo.png"
         alt="Carbonography Logo">
  </div>

  <div id="main">

    <div id="left">

      <div id="rig-container">
        <img id="vehicle-aerial"
             src="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/car-above.png"
             alt="Vehicle top-down view">
        <div id="camera-indicator">
          <img id="camera-icon"
               src="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/camera.png"
               alt="Camera position">
        </div>
      </div>

      <div id="form-scroll">
        <div class="panel-header">Vehicle</div>
        <div class="form-container">
          <div class="form-group full-width">
            <label for="model">Vehicle Model</label>
            <input type="text" id="model" placeholder="Porsche 911 GT3 RS">
          </div>
        </div>
      </div>

    </div>

    <div id="right">

      <div id="controls-panel">
        <div class="panel-header">Studio Controls</div>
        <div class="controls-inner">

          <div class="form-group">
            <label for="lighting">Lighting Mood</label>
            <select id="lighting">
              <option value="studio-high-key">Studio — High Key</option>
              <option value="studio-low-key">Studio — Low Key / Dramatic</option>
              <option value="neon-night">Neon Night</option>
              <option value="daytime-natural">Daytime Natural</option>
              <option value="golden-hour">Golden Hour / Sunrise</option>
              <option value="overcast">Overcast / Diffused</option>
            </select>
          </div>

          <div class="form-group">
            <label for="wheelSize">Wheel Diameter</label>
            <select id="wheelSize">
              <option value="factory-fitted OEM">Factory Fitted</option>
            </select>
          </div>

          <div class="form-group wide">
            <label for="angle">Camera Perspective</label>
            <select id="angle">
              <option value="Front 3/4 hero shot"                   data-x="130"  data-y="-230" data-rot="135">Hero Shot (Front 3/4)</option>
              <option value="Low-slung side profile"                 data-x="170"  data-y="0"    data-rot="180">Side Profile (Passenger)</option>
              <option value="Aggressive rear 3/4"                   data-x="130"  data-y="230"  data-rot="225">Rear 3/4 View</option>
              <option value="Crouching low-angle front center shot" data-x="0"    data-y="-280" data-rot="90" >Front Center (Crouched)</option>
              <option value="Crouching low-angle rear center shot"  data-x="0"    data-y="280"  data-rot="270">Rear Center (Crouched)</option>
              <option value="Rear side angle shot"                  data-x="-130" data-y="230"  data-rot="315">Rear Side Angle (Driver Rear)</option>
              <option value="Top-down bird's eye view"              data-x="0"    data-y="0"    data-rot="90" >Top Down</option>
            </select>
          </div>

          <div class="toggle-inline">
            <div class="checkbox-group"><input type="checkbox" id="lightsOn"><label for="lightsOn">Headlights On</label></div>
            <div class="checkbox-group"><input type="checkbox" id="motion"><label for="motion">Wheel Motion</label></div>
            <div class="checkbox-group"><input type="checkbox" id="convertible"><label for="convertible">Convertible</label></div>
            <div class="checkbox-group"><input type="checkbox" id="lowered"><label for="lowered">Suspension Lowered</label></div>
            <div class="checkbox-group"><input type="checkbox" id="race"><label for="race">Race Variant</label></div>
            <div class="checkbox-group"><input type="checkbox" id="tint"><label for="tint">Window Tint</label></div>
            <div class="checkbox-group"><input type="checkbox" id="leather"><label for="leather">Leather Interior</label></div>
          </div>

        </div>

        <!-- Colour -->
        <div class="panel-header">Colour</div>
        <div class="controls-inner colour-row">
          <div class="colour-group">
            <label>Exterior Colour</label>
            <div class="colour-input-row">
              <input type="color" id="extColourPicker" value="#1a1a1a">
              <input type="text"  id="extColourHex"    value="#1a1a1a" maxlength="7" placeholder="#000000" class="hex-input">
              <input type="text"  id="extColourName"   placeholder="e.g. Obsidian Black" class="colour-name-input">
            </div>
          </div>
          <div class="colour-group">
            <label>Interior Colour</label>
            <div class="colour-input-row">
              <input type="color" id="intColourPicker" value="#2c1a0e">
              <input type="text"  id="intColourHex"    value="#2c1a0e" maxlength="7" placeholder="#000000" class="hex-input">
              <input type="text"  id="intColourName"   placeholder="e.g. Cognac Tan" class="colour-name-input">
            </div>
          </div>
        </div>

        <!-- Number Plate -->
        <div class="panel-header">Number Plate</div>
        <div class="controls-inner plate-row">
          <div class="form-group">
            <label for="plateStyle">Plate Style</label>
            <select id="plateStyle">
              <option value="none">No Plate / Hidden</option>
              <option value="uk">UK — White &amp; Yellow</option>
              <option value="us">US — State Style</option>
              <option value="eu">EU — White with Blue Band</option>
              <option value="custom">Custom / Other</option>
            </select>
          </div>
          <div class="form-group" id="plate-chars-group" style="display:none;">
            <label for="plateChars">Plate Characters</label>
            <div class="plate-input-wrap">
              <input type="text" id="plateChars" placeholder="AB12 CDE" maxlength="12" class="plate-chars-input" autocomplete="off" spellcheck="false">
              <div id="plate-preview-uk"     class="plate-preview plate-uk"     style="display:none;"></div>
              <div id="plate-preview-us"     class="plate-preview plate-us"     style="display:none;"></div>
              <div id="plate-preview-eu"     class="plate-preview plate-eu"     style="display:none;"></div>
              <div id="plate-preview-custom" class="plate-preview plate-custom" style="display:none;"></div>
            </div>
          </div>
        </div>

        <!-- Location & Weather -->
        <div class="panel-header">Location, Weather &amp; Background</div>
        <div class="controls-inner location-row">

          <div class="location-selectors">
            <div class="form-group">
              <label for="location">Background Location</label>
              <select id="location">
                <option value="studio-white">Studio (White)</option>
                <option value="studio-black">Studio (Black)</option>
                <option value="racetrack">Racetrack</option>
                <option value="london-street">London Street</option>
                <option value="desert">Desert</option>
                <option value="transparent">Transparent / Cutout</option>
                <option value="custom">Custom</option>
              </select>
            </div>
            <div class="form-group">
              <label for="weather">Weather Condition</label>
              <select id="weather">
                <option value="none">— Clear / None —</option>
                <option value="rain">Rain</option>
                <option value="heavy-rain">Heavy Rain / Downpour</option>
                <option value="wet">Wet Roads (Post-Rain)</option>
                <option value="snow">Snow / Snowfall</option>
                <option value="snow-ground">Snow on Ground</option>
                <option value="fog">Fog / Mist</option>
                <option value="dust">Dust Storm</option>
                <option value="heatwave">Heatwave / Heat Haze</option>
              </select>
            </div>
          </div>

          <div id="lighting-warning" style="display:none;">
            <div class="conflict-warning">⚠ <strong>Lighting conflict detected.</strong> <span id="warning-text"></span></div>
          </div>
          <div id="weather-warning" style="display:none;">
            <div class="conflict-warning">⚠ <strong>Weather conflict detected.</strong> <span id="weather-warning-text"></span></div>
          </div>

          <div id="custom-location-group" style="display:none;">
            <div class="form-group">
              <label for="customLocation">Describe Your Background</label>
              <input type="text" id="customLocation" placeholder="e.g. Snowy mountain pass at dusk, pine trees lining the road">
            </div>
          </div>

          <div class="overlay-text-group">
            <div class="form-group">
              <label for="overlayText">Overlay Text (optional)</label>
              <input type="text" id="overlayText" placeholder="e.g. GT3 RS — Born on Track">
            </div>
            <div class="form-group">
              <label for="overlayFont">Text Style</label>
              <select id="overlayFont">
                <option value="" data-family="">— None —</option>
                <option value="Bebas Neue, impact style, tall condensed uppercase lettering" data-family="Bebas Neue">Bebas Neue — Bold &amp; Condensed</option>
                <option value="Orbitron, futuristic digital display font" data-family="Orbitron">Orbitron — Futuristic HUD</option>
                <option value="Rajdhani, sharp angular modern sans-serif" data-family="Rajdhani">Rajdhani — Sharp &amp; Angular</option>
                <option value="Russo One, strong geometric slab font" data-family="Russo One">Russo One — Geometric Slab</option>
                <option value="Racing Sans One, motorsport-inspired italic font" data-family="Racing Sans One">Racing Sans One — Motorsport</option>
                <option value="Aldrich, clean technical monospaced-style font" data-family="Aldrich">Aldrich — Technical &amp; Clean</option>
                <option value="Exo 2, sporty wide sci-fi font" data-family="Exo 2">Exo 2 — Sporty &amp; Wide</option>
                <option value="Michroma, narrow technical aerospace font" data-family="Michroma">Michroma — Aerospace</option>
              </select>
            </div>
          </div>

          <div id="font-preview-wrap" style="display:none;">
            <div id="font-preview"></div>
          </div>

        </div>

        <!-- Output spec -->
        <div class="controls-inner output-spec-row">
          <div class="form-group">
            <label for="outputType">Output Type</label>
            <select id="outputType"><option value="image">Image</option><option value="video">Video</option></select>
          </div>
          <div class="form-group">
            <label for="orientation">Orientation</label>
            <select id="orientation"><option value="landscape">Landscape</option><option value="portrait">Portrait</option></select>
          </div>
          <div class="form-group">
            <label for="resolution">Resolution</label>
            <select id="resolution">
              <option value="standard">Standard — 1080p</option>
              <option value="high">High — 4K</option>
              <option value="ultra">Ultra — 8K</option>
            </select>
          </div>
          <div class="form-group">
            <label for="quality">Detail Level</label>
            <select id="quality">
              <option value="standard">Standard</option>
              <option value="high">High Detail</option>
              <option value="extreme">Extreme Detail</option>
            </select>
          </div>
          <div class="toggle-inline" id="video-options" style="display:none;">
            <div class="checkbox-group"><input type="checkbox" id="slowmo"><label for="slowmo">Slow Motion</label></div>
            <div class="checkbox-group"><input type="checkbox" id="dolly"><label for="dolly">Dolly Move</label></div>
            <div class="checkbox-group"><input type="checkbox" id="orbit"><label for="orbit">Orbit Shot</label></div>
            <div class="checkbox-group"><input type="checkbox" id="drone"><label for="drone">Drone Flyover</label></div>
          </div>
        </div>

      </div><!-- /#controls-panel -->

      <div class="panel-header" id="output-panel-header">Generated Image Prompt</div>
      <div id="output-area">Initialize Carbonography System...<span id="cursor"></span></div>

    </div>

  </div>

  <div id="bottom-bar">
    <div id="status-msg">CARBONOGRAPHY // READY</div>
    <div id="bottom-bar-right">
      <button class="btn btn-clear" id="clearBtn" title="Reset all fields to defaults">✕ Clear</button>
      <button class="btn btn-outline" id="exportBtn">Export .TXT</button>
      <button class="btn btn-outline" id="copyBtn">Copy Prompt</button>
      <button class="btn btn-generator" id="ideogramBtn">⚡ Ideogram</button>
      <button class="btn btn-generator" id="leonardoBtn">⚡ Leonardo</button>
    </div>
  </div>

</div><!-- /#app -->

<div id="generator-toast"></div>

<div id="clear-modal" style="display:none;">
  <div id="clear-modal-box">
    <p>Reset all fields to defaults?</p>
    <div id="clear-modal-buttons">
      <button class="btn btn-outline" id="clear-cancel">Cancel</button>
      <button class="btn btn-primary" id="clear-confirm">Reset</button>
    </div>
  </div>
</div>

<style>
  /* ════════════════════════════════════════════════════
     COLOUR TOKENS — darker red throughout
  ════════════════════════════════════════════════════ */
  :root {
    --red:       #6b0000;   /* darker than original #8b0000 */
    --red-hover: #8b0000;   /* hover lifts to previous base */
    --red-light: #550000;   /* for borders / subtle accents  */
  }

  /* Override global.css tokens */
  body { --dark-red: var(--red); --red-hover: var(--red-hover); }

  /* ════════════════════════════════════════════════════
     PAGE BORDER — carbon fibre wrapping the whole app
  ════════════════════════════════════════════════════ */
  html {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: 300px auto;
    background-repeat: repeat;
    background-color: #0a0a0a;
    min-height: 100%;
  }

  /* The app sits inside an 8px carbon border gap on all sides */
  #app {
    margin: 8px;
    border: 3px solid var(--red);
    border-radius: 4px;
    overflow: hidden;
  }

  /* ════════════════════════════════════════════════════
     CARBON TEXTURE — internal sections
  ════════════════════════════════════════════════════ */
  #top-toolbar {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: cover; background-position: center; background-repeat: repeat;
    position: relative; overflow: hidden;
    border-bottom: 3px solid var(--red);
  }
  #top-toolbar::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.45); z-index:0; pointer-events:none; }
  #top-toolbar > * { position:relative; z-index:1; }

  #form-scroll {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: cover; background-position: center; background-repeat: repeat; position: relative;
  }
  #form-scroll::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:0; pointer-events:none; }
  #form-scroll > * { position:relative; z-index:1; }

  #controls-panel {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: cover; background-position: center; background-repeat: repeat; position: relative;
  }
  #controls-panel::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:0; pointer-events:none; }
  #controls-panel > * { position:relative; z-index:1; }

  #bottom-bar {
    background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbon.jpg');
    background-size: cover; background-position: center; background-repeat: repeat; position: relative;
  }
  #bottom-bar::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.55); z-index:0; pointer-events:none; }
  #bottom-bar > * { position:relative; z-index:1; }

  #rig-container { background: radial-gradient(ellipse 60% 75% at 50% 50%, #2a2a2a 0%, #000 100%) !important; }

  /* ════════════════════════════════════════════════════
     OUTPUT AREA — smaller monospace text
  ════════════════════════════════════════════════════ */
  #output-area {
    background: #0a0a0a !important;
    font-size: 11px !important;
    line-height: 1.7 !important;
    color: #c8c8c8 !important;
  }

  /* Blink cursor inherits the darker red */
  #cursor { background: var(--red) !important; }

  /* ════════════════════════════════════════════════════
     RED OVERRIDES — panel headers, borders, accents
  ════════════════════════════════════════════════════ */
  .panel-header           { background: var(--red) !important; }
  .prompt-header          { background: var(--red) !important; }
  .tab-btn.active         { border-bottom-color: var(--red) !important; }
  #tab-bar                { border-bottom-color: var(--red) !important; }
  #action-bar             { border-top-color: var(--red) !important; }

  input:focus,
  select:focus            { border-color: var(--red) !important; }

  .btn-primary            { background: var(--red) !important; }
  .btn-primary:hover,
  .btn-primary:active     { background: var(--red-hover) !important; }

  .btn-outline            { border-color: var(--red) !important; }
  .btn-outline:hover,
  .btn-outline:active     { background: var(--red) !important; }

  #bottom-bar             { border-top: 3px solid var(--red) !important; }

  .checkbox-group input[type="checkbox"] { accent-color: var(--red) !important; }

  /* ════════════════════════════════════════════════════
     CLEAR BUTTON
  ════════════════════════════════════════════════════ */
  .btn-clear {
    background: transparent; border: 2px solid #555; color: #888;
    border-radius: 8px; padding: 10px 16px; font-size: 12px; font-weight: 900;
    font-family: var(--font-ui); text-transform: uppercase; letter-spacing: 1px;
    cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-clear:hover { border-color: var(--red); color: #ff6666; background: rgba(107,0,0,0.2); }

  /* ════════════════════════════════════════════════════
     CONFIRM MODAL
  ════════════════════════════════════════════════════ */
  #clear-modal {
    position:fixed; inset:0; background:rgba(0,0,0,0.75);
    display:flex; align-items:center; justify-content:center; z-index:10000;
  }
  #clear-modal-box {
    background:#141414; border:2px solid var(--red); border-radius:10px;
    padding:28px 32px; text-align:center; max-width:320px; width:90%;
  }
  #clear-modal-box p { color:#f5f5f5; font-size:15px; font-weight:700; margin-bottom:20px; letter-spacing:0.5px; }
  #clear-modal-buttons { display:flex; gap:12px; justify-content:center; }
  #clear-modal-buttons .btn { padding:10px 24px; font-size:13px; }

  /* ════════════════════════════════════════════════════
     CONFLICT WARNINGS
  ════════════════════════════════════════════════════ */
  .conflict-warning {
    background:rgba(107,0,0,0.25); border:1px solid var(--red); border-radius:6px;
    padding:10px 14px; font-size:12px; color:#ffaaaa; line-height:1.5;
  }
  .conflict-warning strong { color:#ff8888; }

  /* ════════════════════════════════════════════════════
     LOCATION + WEATHER ROW
  ════════════════════════════════════════════════════ */
  .location-selectors { display:flex; gap:16px; flex-wrap:wrap; }
  .location-selectors .form-group { flex:1; min-width:180px; }
  .location-row { display:flex; flex-direction:column; gap:14px; }

  /* ════════════════════════════════════════════════════
     PLATE
  ════════════════════════════════════════════════════ */
  .plate-row { display:flex; align-items:flex-start; gap:20px; flex-wrap:wrap; }
  .plate-row .form-group { min-width:180px; }
  .plate-input-wrap { display:flex; flex-direction:column; gap:10px; }
  .plate-chars-input { font-family:'Courier New',monospace !important; font-size:20px !important; font-weight:900 !important; letter-spacing:4px; text-transform:uppercase; width:100%; padding:10px 14px !important; }
  .plate-preview { display:inline-flex; align-items:center; justify-content:center; font-weight:900; letter-spacing:3px; text-transform:uppercase; border-radius:4px; padding:6px 16px; font-size:22px; min-width:180px; min-height:46px; border:2px solid #555; user-select:none; }
  .plate-uk { background:#f5f0c8; color:#111; border-color:#bbb; border-radius:6px; border-width:3px; position:relative; padding-left:36px; }
  .plate-uk::before { content:'GB'; position:absolute; left:0; top:0; bottom:0; width:30px; background:#003399; color:#fff; font-size:9px; font-weight:900; display:flex; align-items:center; justify-content:center; border-radius:3px 0 0 3px; }
  .plate-us { background:#fff; color:#1a1a6e; font-family:'Arial Black','Impact',sans-serif; border-color:#1a1a6e; border-width:3px; font-size:20px; }
  .plate-eu { background:#fff; color:#111; border-color:#ccc; border-radius:4px; border-width:2px; padding-left:36px; position:relative; }
  .plate-eu::before { content:'EU'; position:absolute; left:0; top:0; bottom:0; width:30px; background:#003399; color:#FFD700; font-size:8px; font-weight:900; display:flex; align-items:center; justify-content:center; border-radius:3px 0 0 3px; }
  .plate-custom { background:#1a1a1a; color:#f5f5f5; font-family:'Arial Black',sans-serif; border-color:#555; border-radius:4px; }

  /* ════════════════════════════════════════════════════
     OVERLAY TEXT / FONT PREVIEW
  ════════════════════════════════════════════════════ */
  .overlay-text-group { display:flex; gap:14px; flex-wrap:wrap; }
  .overlay-text-group .form-group { flex:1; min-width:180px; }
  #font-preview-wrap { background:#0a0a0a; border:1px solid #333; border-radius:6px; padding:14px 20px; text-align:center; }
  #font-preview { font-size:28px; color:#f5f5f5; letter-spacing:2px; text-transform:uppercase; transition:font-family 0.2s; word-break:break-word; }

  /* ════════════════════════════════════════════════════
     GENERATOR BUTTONS
  ════════════════════════════════════════════════════ */
  .btn-generator {
    background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
    color:#e0e0ff; border:1px solid #4a4a8a; border-radius:8px;
    padding:10px 16px; font-size:12px; font-weight:900; font-family:var(--font-ui);
    text-transform:uppercase; letter-spacing:1px; cursor:pointer; transition:all 0.2s;
    white-space:nowrap; flex-shrink:0;
  }
  .btn-generator:hover { background:linear-gradient(135deg,#2a2a4e 0%,#26316e 50%,#1f4480 100%); border-color:#7a7aca; color:#fff; transform:translateY(-1px); box-shadow:0 4px 12px rgba(100,100,200,0.3); }
  .btn-generator:active { transform:translateY(0); }

  /* ════════════════════════════════════════════════════
     TOAST
  ════════════════════════════════════════════════════ */
  #generator-toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a1a2e; border:1px solid #4a4a8a; color:#e0e0ff; padding:12px 20px; border-radius:8px; font-size:13px; font-weight:700; font-family:var(--font-ui); letter-spacing:0.5px; opacity:0; transition:all 0.3s ease; pointer-events:none; z-index:9999; text-align:center; white-space:nowrap; }
  #generator-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ════════════════════════════════════════════════════
     CHECKBOX FIX
  ════════════════════════════════════════════════════ */
  .checkbox-group input[type="checkbox"] { width:18px; height:18px; min-width:18px; cursor:pointer; flex-shrink:0; opacity:1; -webkit-appearance:checkbox; appearance:checkbox; }

  /* ════════════════════════════════════════════════════
     COLOUR PICKERS
  ════════════════════════════════════════════════════ */
  .colour-row { display:flex; gap:24px; flex-wrap:wrap; }
  .colour-group { display:flex; flex-direction:column; gap:8px; flex:1; min-width:220px; }
  .colour-input-row { display:flex; align-items:center; gap:10px; }
  input[type="color"] { width:44px; height:44px; border:2px solid #444; border-radius:6px; padding:2px; background:#2c2c2c; cursor:pointer; flex-shrink:0; -webkit-appearance:none; appearance:none; }
  input[type="color"]::-webkit-color-swatch-wrapper { padding:0; border-radius:4px; }
  input[type="color"]::-webkit-color-swatch { border:none; border-radius:4px; }
  .hex-input { width:90px; font-family:'Consolas','Monaco',monospace; font-size:14px; text-transform:uppercase; letter-spacing:1px; flex-shrink:0; }
  .colour-name-input { flex:1; font-size:14px; }
</style>

<script>
  const WHEEL_MIN = 13;
  const WHEEL_MAX = 22;
  const STATUS_RESET_MS = 2000;
  const $ = id => document.getElementById(id);
  let currentPrompt = '';

  const LIGHTING_MAP = {
    'studio-high-key': { prompt:'softbox lighting, high-key studio strobes, white fill cards, bright even illumination with minimal shadows, clean specular highlights on bodywork', warnWith:{ 'neon-night':'','london-street':'','racetrack':'','desert':'','golden-hour':'' }, label:'Studio — High Key' },
    'studio-low-key':  { prompt:'dramatic low-key lighting, single hard key light, deep shadow gradients, sharp rim lighting separating car from background, moody chiaroscuro', warnWith:{}, label:'Studio — Low Key' },
    'neon-night':      { prompt:'cinematic nighttime lighting, vibrant neon sign glow, coloured light spill across bodywork, wet surface reflections, realistic bloom and lens flare on light sources, dark atmospheric shadows', warnWith:{ 'studio-white':'A white studio backdrop kills neon bloom. Switch to Studio (Black) or London Street.', 'desert':'Desert locations are daylight environments — try Golden Hour or Daytime instead.', 'transparent':'Transparent cutouts need neutral lighting. Neon glow will tint the cutout edges.' }, label:'Neon Night' },
    'daytime-natural': { prompt:'bright natural daylight, harsh directional sunlight, crisp hard shadows, clear blue sky ambient fill, realistic outdoor illumination', warnWith:{ 'studio-white':'Natural sunlight and a studio backdrop contradict each other. Try Racetrack or Desert.', 'studio-black':'Natural sunlight and a dark studio contradict each other. Try an outdoor location.' }, label:'Daytime Natural' },
    'golden-hour':     { prompt:'golden hour warm directional sunlight, long soft shadows, orange and amber light spilling across body panels, warm atmospheric haze, gentle lens flare', warnWith:{ 'studio-white':'Golden hour tones clash with a neutral white studio. Try an outdoor location.', 'studio-black':'Golden hour is outdoor natural light — a dark studio creates a contradiction.' }, label:'Golden Hour' },
    'overcast':        { prompt:'overcast diffused lighting, flat even sky illumination, soft shadowless light, subtle cool-grey ambient tone, clean reflections across all panels', warnWith:{}, label:'Overcast / Diffused' },
  };

  const LOCATION_MAP = {
    'studio-white':  { prompt:'pure white seamless paper backdrop, professional automotive photography studio, clean reflective white floor', label:'Studio (White)' },
    'studio-black':  { prompt:'pure black seamless backdrop, darkened professional studio, polished dark floor with subtle car reflection', label:'Studio (Black)' },
    'racetrack':     { prompt:'FIA-grade racing circuit, pit lane straight, dark tarmac with painted race markings and start/finish lines, grandstands softly blurred in background', label:'Racetrack' },
    'london-street': { prompt:'gritty London city street, rain-soaked wet cobblestones reflecting ambient light, iconic red double-decker bus blurred in background, glowing street lamps', label:'London Street' },
    'desert':        { prompt:'vast open desert landscape, cracked salt flat stretching to the horizon, dramatic cloudless sky, golden dust haze in the air', label:'Desert' },
    'transparent':   { prompt:'fully transparent background, vehicle completely isolated with no backdrop, clean cutout with no colour cast on edges', label:'Transparent / Cutout' },
    'custom':        { prompt:null, label:'Custom' },
  };

  const WEATHER_MAP = {
    'none':        { prompt:null, label:null, warnStudio:false },
    'rain':        { prompt:'light rain falling, individual raindrops visible in the air, water droplets on all glass and painted surfaces, subtle puddles forming on the ground, rain-blurred background', label:'Rain', warnStudio:true },
    'heavy-rain':  { prompt:'heavy downpour, thick curtains of rain, water sheeting off all body panels, deep puddles with heavy splash, rain mist obscuring the background, dramatic stormy atmosphere', label:'Heavy Rain', warnStudio:true },
    'wet':         { prompt:'wet roads after recent rainfall, deep mirror-like reflections in standing water on tarmac, water droplets still clinging to paint and glass, damp air, glistening surface sheen across the entire vehicle', label:'Wet Roads (Post-Rain)', warnStudio:false },
    'snow':        { prompt:'active snowfall, large snowflakes drifting through the air, thin fresh snow beginning to settle on horizontal surfaces, cold blue-white ambient light, breath-like atmospheric mist', label:'Snow / Snowfall', warnStudio:true },
    'snow-ground': { prompt:'deep snow on the ground, vehicle parked in thick settled snow, snow packed into wheel arch gaps and body creases, crisp cold daylight reflecting off bright white snow, frosted glass surfaces', label:'Snow on Ground', warnStudio:true },
    'fog':         { prompt:'dense fog and low mist, visibility reduced, soft diffused atmospheric light, fog rolling across the ground, vehicle emerging from mist with soft halo effect on lighting', label:'Fog / Mist', warnStudio:false },
    'dust':        { prompt:'swirling dust storm, fine orange-brown dust particles filling the air, grit and dust settled on horizontal body surfaces, reduced visibility through haze, dramatic arid atmosphere', label:'Dust Storm', warnStudio:true },
    'heatwave':    { prompt:'extreme heatwave, visible heat haze rising from tarmac surface, mirages on the road ahead, bleached high-contrast sunlight, shimmering distortion in the distance', label:'Heatwave / Heat Haze', warnStudio:true },
  };

  const QUALITY_MAP = {
    standard: { photo:'commercial automotive photography quality, sharp focus throughout, clean colour grading, professional retouching', render:'high-quality CGI render, clean anti-aliasing, accurate materials' },
    high:     { photo:'macro photography-grade sharpness, micro-texture detail on every panel, subsurface scattering in paint depth, HDR tonal range, studio-grade colour accuracy, hyper-realistic reflections', render:'photorealistic CGI, subsurface scattering on paint, ray-traced reflections and shadows, micro-detail geometry, HDR lighting, production-quality render' },
    extreme:  { photo:'extreme macro photography, every panel pore and surface imperfection visible, subsurface scattering deep in paint lacquer, museum-quality reference photography, beyond-8K detail density', render:'reference-grade photorealism, subsurface scattering through clear coat, ray-traced global illumination, ultra-detail displacement mapping, film-grain realism, beyond-8K render quality' },
  };

  const RESOLUTION_MAP = {
    standard: { label:'1920×1080', tag:'1080p full HD, high detail' },
    high:     { label:'3840×2160', tag:'4K ultra HD, very high detail' },
    ultra:    { label:'7680×4320', tag:'8K resolution, extreme detail, macro photography sharpness' },
  };

  const ORIENTATION_MAP = {
    landscape: { label:'landscape', ratio:'16:9 aspect ratio, horizontal widescreen composition' },
    portrait:  { label:'portrait',  ratio:'9:16 aspect ratio, vertical portrait composition' },
  };

  const VIDEO_MAP = {
    slowmo:'ultra slow-motion capture at 240fps',
    dolly: 'cinematic dolly push-in camera move',
    orbit: '360-degree orbit shot around the vehicle',
    drone: 'sweeping drone flyover aerial cinematography',
  };

  const PLATE_STYLES = {
    uk:     { label:'UK-style white number plate with Charles Wright typeface black lettering', previewId:'plate-preview-uk' },
    us:     { label:'US-style state licence plate with bold sans-serif characters',             previewId:'plate-preview-us' },
    eu:     { label:'EU-style white number plate with blue country identification band',        previewId:'plate-preview-eu' },
    custom: { label:'custom-style number plate',                                                previewId:'plate-preview-custom' },
  };

  // ── Wheels ─────────────────────────────────────────────────────────────────
  (function populateWheels() {
    const sel = $('wheelSize');
    for (let i = WHEEL_MIN; i <= WHEEL_MAX; i++) {
      const opt = document.createElement('option');
      opt.value = `${i}-inch`;
      opt.textContent = `${i}" Alloy`;
      sel.appendChild(opt);
    }
  })();

  // ── Colour sync ────────────────────────────────────────────────────────────
  function syncColour(pickerId, hexId) {
    const picker = $(pickerId), hex = $(hexId);
    picker.addEventListener('input', () => { hex.value = picker.value.toUpperCase(); autoGenerate(); });
    hex.addEventListener('input',   () => { if (/^#[0-9a-fA-F]{6}$/.test(hex.value.trim())) picker.value = hex.value.trim(); autoGenerate(); });
  }
  syncColour('extColourPicker','extColourHex');
  syncColour('intColourPicker','intColourHex');
  $('extColourName').addEventListener('input', autoGenerate);
  $('intColourName').addEventListener('input', autoGenerate);

  function colourDesc(hexId, nameId) {
    const hex  = $(hexId).value.trim().toUpperCase();
    const name = $(nameId).value.trim();
    return name ? `${name} (hex reference ${hex})` : `colour hex ${hex}`;
  }

  // ── Conflict checks ────────────────────────────────────────────────────────
  function checkConflicts() {
    const lightKey   = $('lighting').value;
    const locKey     = $('location').value;
    const weatherKey = $('weather').value;
    const lighting   = LIGHTING_MAP[lightKey];
    const weather    = WEATHER_MAP[weatherKey];

    const lWarn = $('lighting-warning'), lText = $('warning-text');
    if (lighting?.warnWith?.[locKey]) {
      lText.textContent = lighting.warnWith[locKey];
      lWarn.style.display = 'block';
    } else { lWarn.style.display = 'none'; }

    const wWarn = $('weather-warning'), wText = $('weather-warning-text');
    const isStudio = locKey === 'studio-white' || locKey === 'studio-black';
    if (weather?.warnStudio && isStudio && weatherKey !== 'none') {
      wText.textContent = `${weather.label} weather doesn't work in a studio. Choose an outdoor location to use this effect.`;
      wWarn.style.display = 'block';
    } else { wWarn.style.display = 'none'; }
  }

  // ── Plate preview ──────────────────────────────────────────────────────────
  function updatePlatePreview() {
    const style = $('plateStyle').value;
    const chars = $('plateChars').value.trim().toUpperCase();
    ['uk','us','eu','custom'].forEach(s => { $('plate-preview-' + s).style.display = 'none'; });
    if (style === 'none') {
      $('plate-chars-group').style.display = 'none';
    } else {
      $('plate-chars-group').style.display = 'block';
      if (chars) { const p = $(PLATE_STYLES[style].previewId); p.textContent = chars; p.style.display = 'inline-flex'; }
    }
    autoGenerate();
  }
  $('plateStyle').addEventListener('change', updatePlatePreview);
  $('plateChars').addEventListener('input', () => { $('plateChars').value = $('plateChars').value.toUpperCase(); updatePlatePreview(); });

  // ── Location / lighting / weather ──────────────────────────────────────────
  $('location').addEventListener('change', () => { $('custom-location-group').style.display = $('location').value === 'custom' ? 'block' : 'none'; checkConflicts(); autoGenerate(); });
  $('lighting').addEventListener('change', () => { checkConflicts(); autoGenerate(); });
  $('weather').addEventListener('change',  () => { checkConflicts(); autoGenerate(); });
  $('customLocation').addEventListener('input', autoGenerate);

  // ── Font preview ───────────────────────────────────────────────────────────
  function updateFontPreview() {
    const sel = $('overlayFont'), family = sel.options[sel.selectedIndex].getAttribute('data-family');
    const text = $('overlayText').value.trim();
    if (family && text) {
      $('font-preview').style.fontFamily = `'${family}', sans-serif`;
      $('font-preview').textContent = text;
      $('font-preview-wrap').style.display = 'block';
    } else { $('font-preview-wrap').style.display = 'none'; }
    autoGenerate();
  }
  $('overlayFont').addEventListener('change', updateFontPreview);
  $('overlayText').addEventListener('input',  updateFontPreview);

  // ── Video toggle ───────────────────────────────────────────────────────────
  $('outputType').addEventListener('change', () => {
    const isVideo = $('outputType').value === 'video';
    $('video-options').style.display = isVideo ? 'flex' : 'none';
    $('output-panel-header').textContent = isVideo ? 'Generated Video Prompt' : 'Generated Image Prompt';
    autoGenerate();
  });

  // ── Camera indicator ───────────────────────────────────────────────────────
  function updateCameraIndicator(opt) {
    const x = parseFloat(opt.getAttribute('data-x'));
    const y = parseFloat(opt.getAttribute('data-y'));
    const rot = parseFloat(opt.getAttribute('data-rot')) + 90;
    $('camera-indicator').style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
  }

  // ── Clear / reset ──────────────────────────────────────────────────────────
  function resetAllFields() {
    $('model').value = ''; $('lighting').value = 'studio-high-key';
    $('wheelSize').value = 'factory-fitted OEM'; $('angle').value = $('angle').options[0].value;
    $('location').value = 'studio-white'; $('weather').value = 'none';
    $('plateStyle').value = 'none'; $('plateChars').value = '';
    $('extColourPicker').value = '#1a1a1a'; $('extColourHex').value = '#1A1A1A'; $('extColourName').value = '';
    $('intColourPicker').value = '#2c1a0e'; $('intColourHex').value = '#2C1A0E'; $('intColourName').value = '';
    $('customLocation').value = ''; $('overlayText').value = ''; $('overlayFont').value = '';
    $('outputType').value = 'image'; $('orientation').value = 'landscape';
    $('resolution').value = 'standard'; $('quality').value = 'standard';
    ['lightsOn','motion','convertible','lowered','race','tint','leather','slowmo','dolly','orbit','drone'].forEach(id => { $(id).checked = false; });
    $('custom-location-group').style.display = 'none';
    $('video-options').style.display = 'none';
    $('font-preview-wrap').style.display = 'none';
    $('output-panel-header').textContent = 'Generated Image Prompt';
    updatePlatePreview(); checkConflicts(); autoGenerate(); flashStatus('CLEARED — READY');
  }

  $('clearBtn').addEventListener('click', () => { $('clear-modal').style.display = 'flex'; });
  $('clear-cancel').addEventListener('click', () => { $('clear-modal').style.display = 'none'; });
  $('clear-confirm').addEventListener('click', () => { $('clear-modal').style.display = 'none'; resetAllFields(); });
  $('clear-modal').addEventListener('click', e => { if (e.target === $('clear-modal')) $('clear-modal').style.display = 'none'; });

  // ── Prompt builder ─────────────────────────────────────────────────────────
  function buildPrompt() {
    const model      = $('model').value.trim() || '[VEHICLE]';
    const lightKey   = $('lighting').value;
    const lighting   = LIGHTING_MAP[lightKey];
    const wheelVal   = $('wheelSize').value;
    const isFactory  = wheelVal === 'factory-fitted OEM';
    const wheelText  = isFactory ? 'factory-fitted OEM wheels' : `${wheelVal} custom alloy rims`;
    const angleEl    = $('angle');
    const angle      = angleEl.value;
    const interior   = $('leather').checked ? 'luxurious quilted leather' : 'performance textile';
    const outputType = $('outputType').value;
    const isVideo    = outputType === 'video';
    const orientation= ORIENTATION_MAP[$('orientation').value];
    const resolution = RESOLUTION_MAP[$('resolution').value];
    const quality    = QUALITY_MAP[$('quality').value][isVideo ? 'render' : 'photo'];
    const extColour  = colourDesc('extColourHex','extColourName');
    const intColour  = colourDesc('intColourHex','intColourName');

    const plateStyle = $('plateStyle').value;
    const plateChars = $('plateChars').value.trim().toUpperCase();
    const hasPlate   = plateStyle !== 'none' && plateChars.length > 0;

    const locKey     = $('location').value;
    const locData    = LOCATION_MAP[locKey];
    const locationStr= locKey === 'custom' ? ($('customLocation').value.trim() || 'a custom environment') : locData.prompt;

    const weatherKey = $('weather').value;
    const weather    = WEATHER_MAP[weatherKey];
    const hasWeather = weatherKey !== 'none';

    const overlayText = $('overlayText').value.trim();
    const fontSel     = $('overlayFont');
    const fontVal     = fontSel.value;
    const fontFamily  = fontSel.options[fontSel.selectedIndex].getAttribute('data-family');

    const mods = [
      $('lightsOn').checked    && 'headlights and taillights illuminated with realistic photon bloom',
      $('motion').checked      && 'motion-blurred spinning wheels conveying speed',
      $('convertible').checked && 'convertible soft-top retracted',
      $('lowered').checked     && 'slammed lowered suspension, minimal wheel arch gap',
      $('race').checked        && 'full racing-specification aerodynamics, widebody kit, large rear wing',
      $('tint').checked        && 'limo-style dark privacy window tinting',
    ].filter(Boolean);

    const videoMods = isVideo ? ['slowmo','dolly','orbit','drone'].filter(id => $(id).checked).map(id => VIDEO_MAP[id]) : [];

    updateCameraIndicator(angleEl.options[angleEl.selectedIndex]);

    let prompt  = `>> CARBONOGRAPHY-V1.7-STRING\n`;
    prompt     += `>> TYPE: ${isVideo?'VIDEO':'IMAGE'} | ORIENTATION: ${orientation.label.toUpperCase()} | RESOLUTION: ${resolution.label}\n`;
    prompt     += `>> PERSPECTIVE: ${angle.toUpperCase()}\n`;
    prompt     += `>> LIGHTING: ${lighting.label.toUpperCase()}\n`;
    prompt     += `>> LOCATION: ${locData ? locData.label.toUpperCase() : 'CUSTOM'}${hasWeather ? ` | WEATHER: ${weather.label.toUpperCase()}` : ''}\n`;
    prompt     += `>> EXT COLOUR: ${extColour} | INT COLOUR: ${intColour}\n`;
    if (hasPlate) prompt += `>> PLATE: "${plateChars}" — ${PLATE_STYLES[plateStyle].label}\n`;
    if (overlayText && fontVal) prompt += `>> OVERLAY TEXT: "${overlayText}" in ${fontFamily} typeface\n`;
    prompt     += `\n`;

    prompt += isVideo ? `Cinematic automotive ${orientation.label} video of a ${model}. ` : `Professional automotive ${orientation.label} photograph of a ${model}. `;
    prompt += `Exterior finished in ${extColour} with deep glossy clear coat, subsurface scattering visible through paint depth. `;
    prompt += `Interior trimmed in ${intColour} ${interior}. `;
    prompt += `Captured from a ${angle}. `;
    prompt += isFactory ? `Wheels are factory-fitted OEM specification. ` : `Fitted with ${wheelText}. `;
    prompt += `Lighting: ${lighting.prompt}. `;
    prompt += `Background: ${locationStr}. `;
    if (hasWeather) prompt += `Weather conditions: ${weather.prompt}. `;
    if (hasPlate)   prompt += `The vehicle bears a clearly legible ${PLATE_STYLES[plateStyle].label} reading "${plateChars}", correctly mounted, photorealistic raised characters. `;
    if (mods.length) prompt += `Vehicle specification includes: ${mods.join(', ')}. `;
    if (videoMods.length) prompt += `Camera direction: ${videoMods.join(', ')}. `;
    if (overlayText && fontVal) prompt += `Typography overlay: the text "${overlayText}" rendered in ${fontVal} typeface, bold and large, composited naturally into the image. `;
    prompt += isVideo
      ? `Technical: ${resolution.tag}, ${quality}, cinematic colour grade, motion blur on moving elements, rack focus depth of field, photorealistic materials throughout.`
      : `Technical: ${resolution.tag}, ${quality}, crisp optical sharpness, accurate colour reproduction, photorealistic render.`;

    return prompt;
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function autoGenerate() {
    currentPrompt = buildPrompt();
    const output = $('output-area');
    output.textContent = currentPrompt;
    const cursor = document.createElement('span');
    cursor.id = 'cursor';
    output.appendChild(cursor);
  }

  function flashStatus(msg) { const el = $('status-msg'); el.textContent = msg; setTimeout(() => { el.textContent = 'CARBONOGRAPHY // READY'; }, STATUS_RESET_MS); }
  function showToast(msg) { const t = $('generator-toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500); }

  function openInGenerator(url, siteName) {
    if (!currentPrompt) { flashStatus('NO PROMPT TO SEND'); return; }
    navigator.clipboard.writeText(currentPrompt)
      .then(() => { showToast(`✓ Prompt copied — paste into ${siteName} when it opens`); setTimeout(() => window.open(url,'_blank'), 400); })
      .catch(() => { showToast(`⚠ Could not auto-copy — copy manually then paste into ${siteName}`); setTimeout(() => window.open(url,'_blank'), 800); });
  }

  $('ideogramBtn').addEventListener('click', () => openInGenerator('https://ideogram.ai/t/explore','Ideogram'));
  $('leonardoBtn').addEventListener('click', () => openInGenerator('https://app.leonardo.ai/','Leonardo.ai'));
  $('copyBtn').addEventListener('click', () => { if (!currentPrompt) return; navigator.clipboard.writeText(currentPrompt).then(() => flashStatus('COPIED TO CLIPBOARD!')).catch(() => flashStatus('COPY FAILED')); });
  $('exportBtn').addEventListener('click', () => {
    if (!currentPrompt) { flashStatus('NOTHING TO EXPORT'); return; }
    const blob = new Blob([currentPrompt],{type:'text/plain'}), url = URL.createObjectURL(blob), a = document.createElement('a');
    a.href = url; a.download = `Carbonography_Prompt_${new Date().toISOString().slice(0,10)}.txt`; a.click(); URL.revokeObjectURL(url);
  });

  ['model','wheelSize','angle','orientation','resolution','quality','outputType',
   'lightsOn','motion','convertible','lowered','race','tint','leather','slowmo','dolly','orbit','drone'
  ].forEach(id => { const el = $(id); el.addEventListener(el.type==='checkbox'?'change':'input', autoGenerate); });

  document.addEventListener('DOMContentLoaded', () => { checkConflicts(); autoGenerate(); });
</script>
</body>
</html>

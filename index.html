<!DOCTYPE html>
<html lang="en">
<head>
    <script>
  if (/Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
      || window.innerWidth <= 768) {
    window.location.replace('m/index.html');
  }
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonography</title>
    <style>
        /* 1. IMPORT CUSTOM FONT */
        @font-face {
            font-family: 'Lotus Eden';
            /* Ensure the path to your font file is correct */
            src: url('fonts/Lotus-Eden-Black-Italic.woff2') format('woff2'),
                 url('fonts/Lotus-Eden-Black-Italic.ttf') format('truetype');
            font-weight: 900; /* 'Black' usually maps to 900 */
            font-style: italic;
        }

        /* 2. RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            /* Applied the new font here */
            font-family: 'Lotus Eden', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* 3. GALLERY / STAGE STYLES */
        .stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .frame {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 4. UI OVERLAYS (Bottom Bar) */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 90px;
            background: rgba(0, 0, 0, 0.8); 
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            color: white;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand h1 {
            font-size: 34px;
            /* Note: Removed 'font-weight: 500' so the 'Black' weight of your font shows correctly */
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .logo {
            height: 90px;
            width: auto;
        }

        /* 5. COUNTDOWN STYLES */
        .countdown-container {
            display: flex;
            gap: 10px;
            text-align: center;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
        }

        .countdown-value {
            font-size: 22px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            font-size: 20px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .bottom-bar {
                flex-direction: column;
                height: auto;
                padding: 15px;
                gap: 10px;
            }
            .brand h1 { font-size: 18px; }
            .countdown-value { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="frame" id="gallery">
            <div class="slide active"><img src="assets/purple-lambo-a.png" alt="Slide 1"></div>
            <div class="slide"><img src="assets/purple-lambo-b.png" alt="Slide 2"></div>
            <div class="slide"><img src="assets/purple-lambo-c.png" alt="Slide 3"></div>
            <div class="slide"><img src="assets/purple-lambo-d.png" alt="Slide 4"></div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="brand">
            <h1>Carbonography</h1>
            <img src="https://raw.githubusercontent.com/aherndavid/carbonography/main/carbonography-logo.png" alt="Logo" class="logo">
        </div>

        <div class="countdown-container" id="countdown">
            <div class="countdown-item">
                <span class="countdown-value" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="hours">00</span>
                <span class="countdown-label">Hrs</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="minutes">00</span>
                <span class="countdown-label">Min</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="seconds">00</span>
                <span class="countdown-label">Sec</span>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date("May 20, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown").innerHTML = "LAUNCHED";
            }
        }

        updateCountdown();
        const timerInterval = setInterval(updateCountdown, 1000);

        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        function showNextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % totalSlides;
            slides[currentSlide].classList.add('active');
        }

        setInterval(showNextSlide, 5000);
    </script>
</body>
</html>

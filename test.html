<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonography</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: sans-serif; overflow: hidden; background-color: #111; }

        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1.5s ease-in-out;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            color: white;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .countdown-container { display: flex; gap: 20px; }
        .countdown-item { display: flex; flex-direction: column; text-align: center; }
        .countdown-value { font-size: 22px; font-weight: bold; }
        .countdown-label { font-size: 10px; text-transform: uppercase; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="background-container" id="bg-slide"></div>

    <div class="bottom-bar">
        <div class="brand">
            <h1>Carbonography</h1>
        </div>

        <div class="countdown-container" id="countdown">
            <div class="countdown-item"><span class="countdown-value" id="days">00</span><span class="countdown-label">Days</span></div>
            <div class="countdown-item"><span class="countdown-value" id="hours">00</span><span class="countdown-label">Hrs</span></div>
            <div class="countdown-item"><span class="countdown-value" id="minutes">00</span><span class="countdown-label">Min</span></div>
            <div class="countdown-item"><span class="countdown-value" id="seconds">00</span><span class="countdown-label">Sec</span></div>
        </div>
    </div>

    <script>
        // --- 1. TEST WITH PLACEHOLDERS FIRST ---
        // Replace these with your FIXED raw github links once this works.
        const images = [
            "https://picsum.photos/id/10/1920/1080",
            "https://picsum.photos/id/20/1920/1080",
            "https://picsum.photos/id/30/1920/1080"
        ];

        let currentIndex = 0;
        const bgContainer = document.getElementById('bg-slide');

        function changeBackground() {
            console.log("Changing to image:", images[currentIndex]); // Check your F12 console
            bgContainer.style.backgroundImage = `url('${images[currentIndex]}')`;
            currentIndex = (currentIndex + 1) % images.length;
        }

        changeBackground(); 
        setInterval(changeBackground, 10000); 

        // --- 2. COUNTDOWN ---
        const targetDate = new Date("May 1, 2026 00:00:00").getTime();
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            document.getElementById("days").innerText = Math.floor(distance / (86400000)).toString().padStart(2, '0');
            document.getElementById("hours").innerText = Math.floor((distance % 86400000) / 3600000).toString().padStart(2, '0');
            document.getElementById("minutes").innerText = Math.floor((distance % 3600000) / 60000).toString().padStart(2, '0');
            document.getElementById("seconds").innerText = Math.floor((distance % 60000) / 1000).toString().padStart(2, '0');
        }
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>

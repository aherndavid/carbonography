<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonography</title>
    <style>
        /* Reset and basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            background-color: #000; /* Dark background while images load */
        }

        /* Background Image Setup */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            /* Smooth fade transition between images */
            transition: background-image 1.5s ease-in-out; 
        }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            color: white;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Brand Section */
        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo {
            height: 40px;
            width: auto;
        }

        /* Countdown Section */
        .countdown-container {
            display: flex;
            gap: 20px;
            text-align: center;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
        }

        .countdown-value {
            font-size: 22px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .bottom-bar {
                flex-direction: column;
                height: auto;
                padding: 15px;
                gap: 10px;
            }
            .brand h1 { font-size: 18px; }
            .countdown-value { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="background-container" id="bg-slide"></div>

    <div class="bottom-bar">
        <div class="brand">
            <h1>Carbonography</h1>
            <img src="https://raw.githubusercontent.com/aherndavid/carbonography/main/carbonography-logo.png" alt="Logo" class="logo">
        </div>

        <div class="countdown-container" id="countdown">
            <div class="countdown-item"><span class="countdown-value" id="days">00</span><span class="countdown-label">Days</span></div>
            <div class="countdown-item"><span class="countdown-value" id="hours">00</span><span class="countdown-label">Hrs</span></div>
            <div class="countdown-item"><span class="countdown-value" id="minutes">00</span><span class="countdown-label">Min</span></div>
            <div class="countdown-item"><span class="countdown-value" id="seconds">00</span><span class="countdown-label">Sec</span></div>
        </div>
    </div>

    <script>
        // --- SLIDESHOW LOGIC ---
        const images = [
            "https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/purple-lambo.png",
            "https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/purple-lambo-a.png",
            "https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/purple-lambo-b.png"
        ];

        let currentIndex = 0;
        const bgContainer = document.getElementById('bg-slide');

        function changeBackground() {
            // Apply the image from the array
            bgContainer.style.backgroundImage = `url('${images[currentIndex]}')`;
            
            // Move to next index, or back to 0
            currentIndex = (currentIndex + 1) % images.length;
        }

        // Initialize slideshow
        changeBackground(); 
        setInterval(changeBackground, 10000); // 10 seconds


        // --- COUNTDOWN LOGIC ---
        const targetDate = new Date("May 1, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown").innerHTML = "LAUNCHED";
            }
        }

        updateCountdown();
        const timerInterval = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonography</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,400..900&display=swap" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Lotus Eden';
            src: url('assets/fonts/lotus-eden-italic.woff2') format('woff2');
            font-weight: bold;
            font-style: italic;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; 
            background-color: #111;
            font-family: 'Inter', sans-serif;
            color: white;
        }

        /* --- Slider Logic --- */
        .slider-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .active {
            opacity: 1;
        }

        .overlay {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%; /* Slightly taller for mobile coverage */
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            z-index: 2;
        }

        /* --- Branding Bar --- */
        .footer-container {
            position: fixed;
            bottom: 40px;
            left: 40px;
            right: 40px; /* Added for mobile centering */
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 30px;
        }

        .logo {
            height: 80px; 
            width: auto;
            display: block;
        }

        .site-name {
            font-family: 'Lotus Eden', 'Playfair Display', serif; 
            font-size: 38px;
            font-weight: 400;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            line-height: 1.2;
            white-space: nowrap;
        }

        /* --- Countdown --- */
        .countdown {
            display: flex;
            gap: 20px;
            padding-left: 30px;
            border-left: 1px solid rgba(255,255,255,0.2);
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 50px;
        }

        .time-value {
            font-size: 40px;
            font-weight: 700;
            font-family: monospace;
        }

        .time-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
        }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .footer-container {
                bottom: 30px;
                left: 0;
                right: 0;
                padding: 0 20px;
                flex-direction: column; /* Stack elements vertically */
                justify-content: center;
                gap: 15px;
                text-align: center;
            }

            .logo {
                height: 60px; /* Smaller logo for mobile */
            }

            .site-name {
                font-size: 26px; /* Scaled down font */
                letter-spacing: 4px; /* More breathable for small screens */
            }

            .countdown {
                border-left: none; /* Remove side border */
                border-top: 1px solid rgba(255,255,255,0.2); /* Horizontal separator */
                padding-left: 0;
                padding-top: 15px;
                gap: 10px;
                width: 100%;
                justify-content: center;
            }

            .time-value {
                font-size: 32px; /* Smaller numbers */
            }

            .time-box {
                min-width: 45px;
            }
        }

        /* Extra small screen adjustment (iPhone SE / Fold) */
        @media (max-width: 380px) {
            .site-name { font-size: 22px; }
            .time-value { font-size: 28px; }
            .time-label { font-size: 9px; }
        }
    </style>
</head>
<body>

    <div class="slider-container">
        <div class="slide active" style="background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/purple-lambo.png');"></div>
        <div class="slide" style="background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/dpaul-gumball-lambo.png');"></div>
    </div>

    <div class="overlay"></div>

    <div class="footer-container">
        <img src="https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/carbonography-logo.png" alt="Carbonography Logo" class="logo">
        
        <span class="site-name">Carbonography</span>

        <div class="countdown" id="clock">
            <div class="time-box">
                <span class="time-value" id="days">00</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">Hrs</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="mins">00</span>
                <span class="time-label">Mins</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="secs">00</span>
                <span class="time-label">Secs</span>
            </div>
        </div>
    </div>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentIdx = 0;

        function cycleImages() {
            slides[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % slides.length;
            slides[currentIdx].classList.add('active');
        }
        setInterval(cycleImages, 10000); 

        const target = new Date("May 1, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const diff = target - now;

            const d = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
            const h = Math.max(0, Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
            const m = Math.max(0, Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)));
            const s = Math.max(0, Math.floor((diff % (1000 * 60)) / 1000));

            document.getElementById('days').innerText = d.toString().padStart(2, '0');
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('mins').innerText = m.toString().padStart(2, '0');
            document.getElementById('secs').innerText = s.toString().padStart(2, '0');

            if (diff < 0) {
                document.getElementById('clock').innerHTML = "LAUNCHED";
            }
        }

        setInterval(updateCountdown, 1000);
        updateCountdown(); 
    </script>
</body>
</html>

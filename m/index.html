<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonography | Mobile</title>
    <style>
        :root {
            --carbon-red: #cc0000;
            --carbon-white: #ffffff;
            --carbon-black: #000000;
            --glass-bg: rgba(255, 255, 255, 0.9); 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .background-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Updated to your portrait/mobile version */
            background-image: url('https://raw.githubusercontent.com/aherndavid/carbonography/main/assets/purple-lambo-mobile.png');
            background-size: cover;
            background-position: center; /* Centered since it's already portrait */
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%);
            z-index: 2;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 20px;
            text-align: center;
        }

        .logo-area img {
            height: 65px;
            width: auto;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        .main-info {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 30px 20px;
            border-bottom: 5px solid var(--carbon-red);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .status-msg {
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            color: var(--carbon-black);
        }

        .status-msg span {
            color: var(--carbon-red);
            display: block;
            font-size: 1.6rem;
        }

        .clock-area {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .unit {
            min-width: 60px;
        }

        .number {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--carbon-black);
        }

        .label {
            font-size: 0.6rem;
            text-transform: uppercase;
            color: #666;
            letter-spacing: 1px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="background-image"></div>
    <div class="overlay"></div>

    <div class="content-wrapper">
        <div class="logo-area">
            <img src="../carbonography-logo.png" alt="Carbonography Logo">
        </div>

        <div class="main-info">
            <div class="status-msg">
                Carbonography <span>Coming Soon</span>
            </div>

            <div class="clock-area" id="timer">
                <div class="unit">
                    <span class="number" id="days">00</span>
                    <span class="label">Days</span>
                </div>
                <div class="unit">
                    <span class="number" id="hours">00</span>
                    <span class="label">Hours</span>
                </div>
                <div class="unit">
                    <span class="number" id="mins">00</span>
                    <span class="label">Mins</span>
                </div>
                <div class="unit">
                    <span class="number" id="secs">00</span>
                    <span class="label">Secs</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const target = new Date("May 1, 2026 00:00:00").getTime();

        function updateClock() {
            const now = new Date().getTime();
            const diff = target - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("mins").innerText = m.toString().padStart(2, '0');
            document.getElementById("secs").innerText = s.toString().padStart(2, '0');

            if (diff < 0) {
                document.getElementById("timer").innerHTML = "LOCKED AND LOADED";
            }
        }

        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonography | Mobile</title>
    <style>
        /* 1. RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            background-color: #000;
        }

        /* 2. MOBILE GALLERY STYLES */
        .stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .frame {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Important for vertical phone screens */
        }

        /* 3. MOBILE UI OVERLAY */
        .ui-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            /* Taller UI for mobile touch/readability */
            padding: 30px 20px 40px 20px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            backdrop-filter: blur(8px);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            z-index: 10;
            text-align: center;
        }

        .brand-mobile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .brand-mobile h1 {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .logo-mobile {
            height: 35px;
            width: auto;
        }

        /* 4. MOBILE COUNTDOWN */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            min-width: 60px;
        }

        .countdown-value {
            font-size: 28px; /* Slightly larger for mobile */
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="frame" id="gallery">
            <div class="slide active"><img src="../assets/purple-lambo-a.png" alt="Slide 1"></div>
            <div class="slide"><img src="../assets/purple-lambo-a.png" alt="Slide 2"></div>
            <div class="slide"><img src="../assets/purple-lambo-b.png" alt="Slide 3"></div>
            <div class="slide"><img src="../assets/purple-lambo-c.png" alt="Slide 3"></div>
            <div class="slide"><img src="../assets/purple-lambo-d.png" alt="Slide 3"></div>
        </div>
    </div>

    <div class="ui-container">
        <div class="brand-mobile">
            <img src="https://raw.githubusercontent.com/aherndavid/carbonography/main/carbonography-logo.png" alt="Logo" class="logo-mobile">
            <h1>Carbonography</h1>
        </div>

        <div class="countdown-container" id="countdown">
            <div class="countdown-item">
                <span class="countdown-value" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="hours">00</span>
                <span class="countdown-label">Hrs</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="minutes">00</span>
                <span class="countdown-label">Min</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="seconds">00</span>
                <span class="countdown-label">Sec</span>
            </div>
        </div>
    </div>

    <script>
        /**
         * 1. COUNTDOWN LOGIC (Same as desktop)
         */
        const targetDate = new Date("May 1, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown").innerHTML = "LAUNCHED";
            }
        }

        updateCountdown();
        const timerInterval = setInterval(updateCountdown, 1000);

        /**
         * 2. IMAGE ROTATION LOGIC (Same as desktop)
         */
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        function showNextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % totalSlides;
            slides[currentSlide].classList.add('active');
        }

        // Rotate every 4 seconds for mobile (slightly faster to keep attention)
        setInterval(showNextSlide, 4000);
    </script>
</body>
</html>

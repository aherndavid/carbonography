<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Carbonography</title>
    <style>
        @font-face {
            font-family: 'Lotus Eden';
            src: url('../fonts/Lotus-Eden-Black-Italic.woff2') format('woff2'),
                 url('../fonts/Lotus-Eden-Black-Italic.ttf') format('truetype');
            font-weight: 900;
            font-style: italic;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            font-family: 'Lotus Eden', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* FULLSCREEN GALLERY */
        .stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px 20px 20px;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand h1 {
            font-size: 26px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #fff;
        }

        .logo {
            height: 50px;
            width: auto;
        }

        /* COUNTDOWN */
        .countdown-container {
            display: flex;
            gap: 14px;
            text-align: center;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 48px;
        }

        .countdown-value {
            font-size: 20px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            color: #fff;
            line-height: 1;
        }

        .countdown-label {
            font-size: 11px;
            text-transform: uppercase;
            opacity: 0.6;
            color: #fff;
            margin-top: 3px;
            letter-spacing: 0.5px;
        }

        .countdown-sep {
            font-size: 20px;
            color: rgba(255,255,255,0.3);
            align-self: flex-start;
            padding-top: 1px;
        }
    </style>
</head>
<body>

    <div class="stage" id="gallery">
        <div class="slide active"><img src="../assets/purple-lambo-m-1.png" alt="Slide 1"></div>
        <div class="slide"><img src="../assets/purple-lambo-m-2.png" alt="Slide 2"></div>
        <div class="slide"><img src="../assets/purple-lambo-m-3.png" alt="Slide 3"></div>
        <div class="slide"><img src="../assets/purple-lambo-m-4.png" alt="Slide 4"></div>
    </div>

    <div class="bottom-bar">
        <div class="brand">
            <h1>Carbonography</h1>
            <img src="https://raw.githubusercontent.com/aherndavid/carbonography/main/carbonography-logo.png" alt="Logo" class="logo">
        </div>

        <div class="countdown-container" id="countdown">
            <div class="countdown-item">
                <span class="countdown-value" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="hours">00</span>
                <span class="countdown-label">Hrs</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="minutes">00</span>
                <span class="countdown-label">Min</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="seconds">00</span>
                <span class="countdown-label">Sec</span>
            </div>
        </div>
    </div>

    <script>
        const targetDate = new Date("May 20, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown").innerHTML = '<span style="color:#fff;font-size:22px;letter-spacing:2px;">LAUNCHED</span>';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        updateCountdown();
        const timerInterval = setInterval(updateCountdown, 1000);

        // Slideshow
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');

        function showNextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(showNextSlide, 5000);
    </script>
</body>
</html>

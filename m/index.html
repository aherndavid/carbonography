<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=.20">
    <title>Carbonography | Mobile</title>
    <style>
        /* 1. IMPORT CUSTOM FONT (Paths adjusted for /m/ folder) */
        @font-face {
            font-family: 'Lotus Eden';
            src: url('../fonts/Lotus-Eden-Black-Italic.woff2') format('woff2'),
                 url('../fonts/Lotus-Eden-Black-Italic.ttf') format('truetype');
            font-weight: 900;
            font-style: italic;
        }

        /* 2. RESET & BASE STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Lotus Eden', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            background-color: #000;
        }

        /* 3. MOBILE GALLERY STYLES */
        .stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .frame {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures cars look good on tall screens */
        }

        /* 4. MOBILE UI OVERLAY (Stacked Layout) */
        .ui-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 20px 50px 20px; /* Extra bottom padding for mobile home bars */
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9) 30%);
            backdrop-filter: blur(8px);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .brand-mobile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .brand-mobile h1 {
            font-size: 30px;
            letter-spacing: 0.1px;
            text-transform: uppercase;
            line-height: 0.5;
        }

        .logo-mobile {
            height: 90px; /* Scaled for mobile */
            width: auto;
        }

        /* 5. MOBILE COUNTDOWN */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .countdown-item {
            display: flex;
            flex-direction: column;
            min-width: 55px;
        }

        .countdown-value {
            font-size: 24px;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            font-size: 12px;
            text-transform: uppercase;
            opacity: 0.7;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="frame" id="gallery">
            <div class="slide active"><img src="../assets/purple-lambo-m-a.png" alt="Slide 1"></div>
            <div class="slide"><img src="../assets/purple-lambo-m-b.png" alt="Slide 2"></div>
            <div class="slide"><img src="../assets/purple-lambo-m-c.png" alt="Slide 3"></div>
            <div class="slide"><img src="../assets/purple-lambo-m-d.png" alt="Slide 4"></div>
        </div>
    </div>

    <div class="ui-container">
        <div class="brand-mobile">
            <img src="https://raw.githubusercontent.com/aherndavid/carbonography/main/carbonography-logo.png" alt="Logo" class="logo-mobile">
            <h1>Carbonography</h1>
        </div>

        <div class="countdown-container" id="countdown">
            <div class="countdown-item">
                <span class="countdown-value" id="days">00</span>
                <span class="countdown-label">Days</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="hours">00</span>
                <span class="countdown-label">Hrs</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="minutes">00</span>
                <span class="countdown-label">Min</span>
            </div>
            <div class="countdown-item">
                <span class="countdown-value" id="seconds">00</span>
                <span class="countdown-label">Sec</span>
            </div>
        </div>
    </div>

    <script>
        // Target Date
        const targetDate = new Date("May 1, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');

            if (distance < 0) {
                clearInterval(timerInterval);
                document.getElementById("countdown").innerHTML = "LAUNCHED";
            }
        }

        updateCountdown();
        const timerInterval = setInterval(updateCountdown, 1000);

        // Rotation Logic
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const totalSlides = slides.length;

        function showNextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % totalSlides;
            slides[currentSlide].classList.add('active');
        }

        setInterval(showNextSlide, 5000);
    </script>
</body>
</html>

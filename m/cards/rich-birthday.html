<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Card for Rich</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #e3f2fd;
            --soft-white: #ffffff;
            --accent-blue: #2196f3;
            --text-dark: #333333;
            --friendly-red: #ff5252;
        }

        body {
            background-color: var(--sky-blue);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Nunito', sans-serif;
        }

        /* Print Button - Soft & Rounded */
        .print-area {
            margin-bottom: 25px;
        }

        .btn-friendly-print {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(33, 150, 243, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-friendly-print:hover {
            background-color: #1976d2;
            transform: scale(1.05);
            box-shadow: 0 8px 15px rgba(33, 150, 243, 0.4);
        }

        /* The Card - Extra Rounded & Soft Shadows */
        .birthday-card {
            background-color: var(--soft-white);
            width: 100%;
            max-width: 850px;
            border-radius: 40px; /* Softer, friendlier corners */
            box-shadow: 0 15px 45px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 8px solid white; /* Inner white border frame */
            transition: transform 0.3s ease;
        }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 32px 32px 0 0;
        }

        .card-body {
            padding: 60px 40px;
            text-align: center;
            background: linear-gradient(to bottom, #ffffff, #fafafa);
        }

        .main-title {
            font-family: 'Caveat', cursive;
            font-size: 5rem;
            color: var(--friendly-red);
            margin: 0;
            line-height: 1;
        }

        .personal-note {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            color: #555;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        .heart {
            color: var(--friendly-red);
            font-size: 1.5rem;
        }

        /* Print Settings */
        @media print {
            .print-area {
                display: none;
            }
            body {
                background-color: white;
                padding: 0;
            }
            .birthday-card {
                box-shadow: none;
                max-width: 100%;
                border: none;
                transform: none !important;
            }
        }

        /* Mobile Friendly */
        @media (max-width: 600px) {
            .main-title { font-size: 3.5rem; }
            .personal-note { font-size: 1.8rem; }
            .card-body { padding: 40px 20px; }
            .birthday-card { border-radius: 25px; }
        }
    </style>
</head>
<body>

    <div class="print-area">
        <button class="btn-friendly-print" onclick="window.print()">
            <span>✨</span> Print Card to PDF
        </button>
    </div>

    <div class="birthday-card">
        <img src="https://github.com/aherndavid/carbonography/raw/main/assets/rich-birthday.png" 
             alt="Happy Birthday Cars" 
             class="card-image">
        
        <div class="card-body">
            <h1 class="main-title">Happy Birthday, Rich!</h1>
            <p class="personal-note">
                From David, Logan & Skylar <span class="heart">♥</span>
            </p>
        </div>
    </div>

</body>
</html>
